<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LipeCare MVP</title>
    <style>
      :root {
        --bg: #06090d;
        --surface: rgb(18 27 36 / 84%);
        --surface-strong: rgb(24 34 45 / 96%);
        --surface-soft: rgb(35 51 64 / 78%);
        --surface-clean: rgb(255 255 255 / 8%);
        --surface-clean-strong: rgb(255 255 255 / 13%);
        --text: #f7fbfb;
        --muted: #b8c8cf;
        --line: rgb(224 255 249 / 18%);
        --line-bright: rgb(255 255 255 / 24%);
        --primary: #4df5d4;
        --primary-dark: #16c8ae;
        --cyan-soft: #9ff7ea;
        --accent: #f4c96b;
        --violet: #b8a7ff;
        --rose: #ff9ab3;
        --danger: #fb7185;
        --ok: #7ddf9f;
        --white-glow: 0 18px 70px rgb(255 255 255 / 8%);
        --glow: 0 0 44px rgb(77 245 212 / 24%);
      }

      * {
        box-sizing: border-box;
        scrollbar-color: rgb(77 245 212 / 64%) rgb(255 255 255 / 8%);
        scrollbar-width: thin;
      }

      *::-webkit-scrollbar {
        height: 10px;
        width: 10px;
      }

      *::-webkit-scrollbar-track {
        background: none;
        border-radius: 999px;
      }

      *::-webkit-scrollbar-thumb {
        background: none;
        border: 2px solid rgb(7 12 18 / 90%);
        border-radius: 999px;
      }

      *::-webkit-scrollbar-thumb:hover {
        background: none;
      }

      body {
        margin: 0;
        background:
          none,
          none,
          none,
          none;
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
      }

      .app {
        background-image:
          none,
          none;
        background-size: 56px 56px;
        min-height: 100vh;
        position: relative;
      }

      .app::before {
        background: none;
        content: "";
        height: 1px;
        left: 0;
        position: fixed;
        right: 0;
        top: 0;
        z-index: 5;
      }

      .login-shell {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(340px, 0.9fr);
        min-height: 100vh;
      }

      .login-hero {
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 56px;
        position: relative;
      }

      .login-panel {
        align-items: center;
        backdrop-filter: blur(18px);
        background: none;
        border-left: 1px solid var(--line);
        display: flex;
        padding: 32px;
      }

      .card {
        backdrop-filter: blur(18px);
        background:
          none,
          var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 24px 90px rgb(0 0 0 / 30%), var(--white-glow);
        position: relative;
      }

      .card::after {
        border-radius: inherit;
        box-shadow: inset 0 1px 0 rgb(255 255 255 / 10%);
        content: "";
        inset: 0;
        pointer-events: none;
        position: absolute;
      }

      .login-card {
        padding: 28px;
        width: 100%;
      }

      .eyebrow {
        color: var(--primary);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0;
        margin: 0 0 12px;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        font-size: clamp(2.4rem, 5vw, 5.2rem);
        letter-spacing: 0;
        line-height: 1;
        margin-bottom: 20px;
        text-wrap: balance;
      }

      .login-hero h1 {
        background: none;
        background-clip: text;
        color: transparent;
        max-width: 980px;
      }

      h2 {
        font-size: 1.35rem;
        margin-bottom: 12px;
      }

      h3 {
        font-size: 1rem;
        margin-bottom: 8px;
      }

      .muted {
        color: var(--muted);
        line-height: 1.6;
      }

      .form {
        display: grid;
        gap: 14px;
      }

      label {
        color: var(--muted);
        display: grid;
        gap: 7px;
        font-size: 0.92rem;
      }

      input,
      select,
      textarea {
        background: none;
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        min-height: 40px;
        padding: 10px 11px;
        width: 100%;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: rgb(77 245 212 / 64%);
        box-shadow: var(--glow);
        outline: none;
      }

      textarea {
        min-height: 82px;
        resize: vertical;
      }

      .btn {
        align-items: center;
        background: none;
        border-radius: 6px;
        color: #04100e;
        cursor: pointer;
        display: inline-flex;
        font-weight: 800;
        justify-content: center;
        min-height: 42px;
        padding: 10px 14px;
        transition:
          transform 140ms ease,
          box-shadow 140ms ease;
      }

      .btn:hover {
        box-shadow: var(--glow);
        transform: translateY(-1px);
      }

      .btn.secondary {
        background: none;
        border: 1px solid var(--line-bright);
        color: #f8ffff;
      }

      .btn.danger {
        background: var(--danger);
        color: #1f070b;
      }

      .sample-users {
        display: grid;
        gap: 8px;
        margin-top: 18px;
      }

      .sample-users button {
        background:
          none,
          var(--surface-soft);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        cursor: pointer;
        padding: 10px;
        text-align: left;
        transition:
          border-color 140ms ease,
          transform 140ms ease;
      }

      .sample-users button:hover {
        border-color: rgb(77 245 212 / 54%);
        transform: translateX(2px);
      }

      .shell {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        min-height: 100vh;
      }

      .shell.sidebar-hidden {
        grid-template-columns: 1fr;
      }

      .shell.sidebar-hidden .sidebar {
        display: none;
      }

      .sidebar-restore {
        background: none;
        border-radius: 999px;
        bottom: 18px;
        box-shadow: var(--glow);
        color: #04100e;
        cursor: pointer;
        display: none;
        font-weight: 900;
        left: 18px;
        min-height: 42px;
        padding: 10px 14px;
        position: fixed;
        z-index: 80;
      }

      .shell.sidebar-hidden .sidebar-restore {
        display: inline-flex;
      }

      .mobile-topbar {
        display: none;
      }

      .mobile-hide-sidebar {
        display: none;
      }

      .sidebar {
        backdrop-filter: blur(20px);
        background:
          none,
          none;
        border-right: 1px solid var(--line);
        padding: 24px;
        position: sticky;
        top: 0;
        height: 100vh;
      }

      .brand {
        align-items: flex-start;
        display: flex;
        gap: 12px;
        margin-bottom: 24px;
      }

      .logo-slot {
        align-items: center;
        background: rgb(255 255 255 / 6%);
        border: 1px solid var(--line-bright);
        border-radius: 8px;
        display: inline-flex;
        flex: 0 0 auto;
        height: 46px;
        justify-content: center;
        overflow: hidden;
        padding: 0;
        width: 46px;
      }

      .brand .logo-slot {
        height: 112px;
        width: 86px;
      }

      .logo-slot img {
        display: block;
        height: 86%;
        object-fit: contain;
        width: 86%;
      }

      .brand strong {
        display: block;
        font-size: 1.35rem;
        letter-spacing: 0;
      }

      .brand span {
        display: block;
      }

      .deploy-meta {
        border-left: 1px solid rgb(255 255 255 / 12%);
        color: var(--muted);
        display: grid;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 0.68rem;
        gap: 3px;
        line-height: 1.35;
        margin-top: 10px;
        padding-left: 10px;
      }

      .deploy-meta b {
        color: var(--accent);
        font-weight: 800;
      }

      .nav {
        display: grid;
        gap: 8px;
      }

      .nav button {
        background: none;
        border: 1px solid transparent;
        border-radius: 6px;
        color: var(--muted);
        cursor: pointer;
        padding: 10px 12px;
        text-align: left;
        transition:
          background 140ms ease,
          border-color 140ms ease,
          color 140ms ease;
      }

      .nav button.active {
        background: none;
        border-color: rgb(77 245 212 / 42%);
        color: var(--primary);
        box-shadow: inset 0 1px 0 rgb(255 255 255 / 14%);
        font-weight: 800;
      }

      .nav button:hover {
        background: none;
        border-color: var(--line-bright);
        color: var(--text);
      }

      .nav-group {
        display: grid;
        gap: 7px;
      }

      .nav-group-title {
        color: rgb(255 255 255 / 72%);
        font-size: 0.72rem;
        font-weight: 900;
        padding: 12px 4px 0;
        text-transform: uppercase;
      }

      .nav-submenu {
        border-left: 1px solid rgb(77 245 212 / 22%);
        display: grid;
        gap: 7px;
        margin-left: 8px;
        padding-left: 10px;
      }

      .nav-submenu button {
        font-size: 0.9rem;
        min-height: 38px;
        padding: 9px 10px;
      }

      .nav-details {
        display: grid;
        gap: 7px;
      }

      .nav-details summary {
        background: none;
        border: 1px solid transparent;
        border-radius: 6px;
        color: rgb(255 255 255 / 72%);
        cursor: pointer;
        font-size: 0.72rem;
        font-weight: 900;
        list-style: none;
        padding: 11px 12px;
        text-transform: uppercase;
      }

      .nav-details summary::-webkit-details-marker {
        display: none;
      }

      .nav-details summary::after {
        content: "+";
        float: right;
      }

      .nav-details[open] summary::after {
        content: "-";
      }

      .user-box {
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.9rem;
        margin-top: 24px;
        padding-top: 18px;
      }

      .language-block {
        display: grid;
        gap: 7px;
        margin-bottom: 16px;
      }

      .language-select {
        background: none;
        border: 1px solid var(--line-bright);
        border-radius: 6px;
        color: var(--text);
        min-height: 38px;
        padding: 8px 10px;
        width: 100%;
      }

      .main {
        padding: 30px;
      }

      .home-hero {
        align-items: stretch;
        background:
          none,
          var(--hero-image, url("assets/home-hero-doctor.png")) var(--hero-position, center) / cover no-repeat;
        border: 1px solid rgb(255 255 255 / 18%);
        border-radius: 8px;
        box-shadow: 0 30px 110px rgb(0 0 0 / 34%), inset 0 1px 0 rgb(255 255 255 / 14%);
        display: grid;
        min-height: 430px;
        overflow: hidden;
        position: relative;
      }

      .home-hero::after {
        background-image:
          none,
          none;
        background-size: 46px 46px;
        content: "";
        inset: 0;
        pointer-events: none;
        position: absolute;
      }

      .home-hero-content {
        align-content: center;
        display: grid;
        gap: 18px;
        max-width: 680px;
        padding: 58px;
        position: relative;
        z-index: 1;
      }

      .home-hero-content h1 {
        font-size: clamp(3.4rem, 7vw, 6.8rem);
        line-height: 0.92;
        margin: 0;
      }

      .home-hero-content p {
        font-size: 1.08rem;
        max-width: 590px;
      }

      .home-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .home-highlights {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        margin-top: 18px;
      }

      .home-highlight {
        background:
          none,
          rgb(18 27 36 / 74%);
        border: 1px solid rgb(255 255 255 / 18%);
        border-radius: 8px;
        box-shadow: inset 0 1px 0 rgb(255 255 255 / 12%);
        padding: 16px;
      }

      .home-highlight strong {
        color: var(--accent);
        display: block;
        font-size: 1.45rem;
      }

      .module-grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .module-thumb {
        background:
          none,
          none;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        cursor: pointer;
        display: grid;
        gap: 12px;
        min-height: 150px;
        padding: 18px;
        text-align: left;
        transition: border-color 180ms ease, transform 180ms ease;
      }

      .module-thumb:hover {
        border-color: rgb(255 255 255 / 34%);
        box-shadow: 0 18px 50px rgb(77 245 212 / 12%);
        transform: translateY(-2px);
      }

      .module-icon {
        align-items: center;
        background: none;
        border: 1px solid rgb(255 255 255 / 22%);
        border-radius: 8px;
        color: var(--accent);
        display: inline-flex;
        height: 42px;
        justify-content: center;
        width: 42px;
      }

      .module-icon svg {
        height: 22px;
        width: 22px;
      }

      .module-thumb strong {
        display: block;
        font-size: 1rem;
      }

      .module-thumb span {
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.45;
      }

      .sidebar-backdrop {
        display: none;
      }

      .section-hero {
        align-items: end;
        background:
          none,
          var(--hero-image, url("assets/home-hero-doctor.png")) var(--hero-position, center) / cover no-repeat;
        border: 1px solid rgb(255 255 255 / 18%);
        border-radius: 8px;
        box-shadow: 0 22px 80px rgb(0 0 0 / 28%), inset 0 1px 0 rgb(255 255 255 / 12%);
        display: flex;
        gap: 16px;
        justify-content: space-between;
        margin-bottom: 22px;
        min-height: 215px;
        overflow: hidden;
        padding: 28px;
        position: relative;
      }

      .section-hero::after {
        background-image:
          none,
          none;
        background-size: 42px 42px;
        content: "";
        inset: 0;
        pointer-events: none;
        position: absolute;
      }

      .section-hero > * {
        position: relative;
        z-index: 1;
      }

      .section-hero h1 {
        font-size: clamp(2.2rem, 4.6vw, 4.8rem);
        margin-bottom: 12px;
      }

      .badge {
        background: none;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--primary);
        display: inline-flex;
        font-size: 0.82rem;
        font-weight: 800;
        padding: 7px 10px;
      }

      .grid {
        display: grid;
        gap: 16px;
      }

      .stats {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .stat {
        padding: 18px;
        overflow: hidden;
      }

      .stat span {
        color: var(--muted);
        display: block;
        margin-bottom: 8px;
      }

      .stat strong {
        color: var(--accent);
        font-size: 2rem;
        text-shadow: 0 0 28px rgb(244 201 107 / 34%);
      }

      .content-grid {
        grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
        margin-top: 16px;
      }

      .section {
        padding: 18px;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        border-collapse: collapse;
        min-width: 720px;
        width: 100%;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 12px 8px;
        text-align: left;
        vertical-align: top;
      }

      th {
        color: #dce8eb;
        font-size: 0.82rem;
        text-transform: uppercase;
      }

      tr.clickable {
        cursor: pointer;
      }

      tr.clickable:hover {
        background: rgb(255 255 255 / 7%);
      }

      .selected-row {
        background: none;
      }

      .pill {
        border-radius: 999px;
        display: inline-flex;
        font-size: 0.78rem;
        font-weight: 800;
        padding: 5px 8px;
      }

      .pill.ok {
        background: rgb(125 223 159 / 14%);
        color: var(--ok);
      }

      .pill.warn {
        background: rgb(244 201 107 / 16%);
        color: var(--accent);
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .timeline {
        display: grid;
        gap: 10px;
      }

      .timeline-item {
        border-left: 3px solid var(--primary);
        padding-left: 12px;
      }

      .timeline-board {
        display: grid;
        gap: 16px;
        grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      }

      .timeline-calendar {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(7, minmax(0, 1fr));
      }

      .calendar-cell {
        background: none;
        border: 1px solid var(--line);
        border-radius: 8px;
        min-height: 78px;
        padding: 8px;
      }

      .calendar-cell strong {
        color: var(--accent);
        display: block;
        font-size: 0.88rem;
        margin-bottom: 6px;
      }

      .calendar-dot {
        border-radius: 999px;
        display: inline-flex;
        height: 8px;
        margin-right: 4px;
        width: 8px;
      }

      .calendar-dot.symptom { background: var(--rose); }
      .calendar-dot.measurement { background: var(--primary); }
      .calendar-dot.task { background: var(--accent); }

      .signal-chart {
        align-items: end;
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(8, minmax(20px, 1fr));
        height: 190px;
      }

      .signal-bar {
        background: none;
        border: 1px solid rgb(255 255 255 / 28%);
        border-radius: 999px 999px 6px 6px;
        min-height: 28px;
      }

      .task-list {
        display: grid;
        gap: 10px;
      }

      .task-item {
        background: none;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
      }

      .settings-grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .image-bank-grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .image-bank-card {
        background: none;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        cursor: pointer;
        display: grid;
        gap: 10px;
        padding: 10px;
        text-align: left;
      }

      .image-bank-card.active {
        border-color: rgb(77 245 212 / 72%);
        box-shadow: 0 0 0 1px rgb(77 245 212 / 22%), var(--glow);
      }

      .image-bank-card img {
        aspect-ratio: 16 / 9;
        border-radius: 6px;
        display: block;
        object-fit: cover;
        width: 100%;
      }

      .image-bank-card strong {
        display: block;
      }

      .image-bank-actions {
        align-items: end;
        display: grid;
        gap: 12px;
        grid-template-columns: minmax(0, 1fr) minmax(180px, 0.35fr);
      }

      .position-control {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .position-control button {
        min-width: 98px;
      }

      .two-cols {
        display: grid;
        gap: 12px;
        grid-template-columns: 1fr 1fr;
      }

      .photo-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .photo-card {
        background:
          none,
          rgb(255 255 255 / 3%);
        border: 1px solid var(--line);
        border-radius: 8px;
        min-height: 110px;
        padding: 12px;
      }

      .alert {
        background: none;
        border: 1px solid rgb(255 255 255 / 18%);
        border-radius: 8px;
        color: #ffe7a6;
        padding: 12px;
      }

      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
      }

      .tab-button {
        background: rgb(255 255 255 / 3%);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--muted);
        cursor: pointer;
        font-weight: 800;
        min-height: 38px;
        padding: 9px 12px;
      }

      .tab-button.active {
        background: rgb(77 245 212 / 14%);
        border-color: rgb(77 245 212 / 42%);
        color: var(--primary);
      }

      .patient-detail {
        grid-column: 1 / -1;
      }

      .form-section {
        border-top: 1px solid var(--line);
        display: grid;
        gap: 14px;
        margin-top: 16px;
        padding-top: 16px;
      }

      .field-manager {
        border: 1px solid var(--line);
        border-radius: 8px;
        display: grid;
        gap: 14px;
        margin-bottom: 16px;
        padding: 14px;
      }

      .field-row {
        align-items: center;
        border-bottom: 1px solid var(--line);
        display: grid;
        gap: 10px;
        grid-template-columns: minmax(0, 1fr) auto auto;
        padding: 10px 0;
      }

      .field-row:last-child {
        border-bottom: 0;
      }

      .field-row-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .field-help {
        color: var(--muted);
        font-size: 0.78rem;
        line-height: 1.4;
      }

      .assistant-card {
        grid-column: 1 / -1;
      }

      .assistant-chat {
        display: grid;
        gap: 12px;
      }

      .assistant-messages {
        display: grid;
        gap: 10px;
        max-height: 260px;
        overflow-y: auto;
      }

      .assistant-message {
        border: 1px solid var(--line);
        border-radius: 8px;
        line-height: 1.5;
        max-width: 78%;
        padding: 10px 12px;
      }

      .assistant-message.assistant {
        background: rgb(77 245 212 / 10%);
        color: var(--text);
      }

      .assistant-message.user {
        background: rgb(244 201 107 / 13%);
        justify-self: end;
      }

      .assistant-form {
        display: grid;
        gap: 10px;
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .assistant-form input {
        background: rgb(255 255 255 / 4%);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        font: inherit;
        min-height: 44px;
        padding: 10px 12px;
      }

      .audio-actions {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .audio-status {
        color: var(--accent);
        font-weight: 800;
      }

      .architecture-shell {
        display: grid;
        gap: 16px;
      }

      .architecture-map {
        background:
          none,
          none,
          none;
        border: 1px solid rgb(77 245 212 / 22%);
        border-radius: 8px;
        display: grid;
        gap: 18px;
        overflow: hidden;
        padding: 18px;
        position: relative;
      }

      .architecture-map::before {
        background:
          none,
          none;
        background-size: 42px 42px;
        content: "";
        inset: 0;
        opacity: 0.55;
        pointer-events: none;
        position: absolute;
      }

      .architecture-map > * {
        position: relative;
        z-index: 1;
      }

      .architecture-core {
        align-items: center;
        background:
          none,
          rgb(6 9 13 / 72%);
        border: 1px solid rgb(77 245 212 / 42%);
        border-radius: 8px;
        box-shadow: 0 0 42px rgb(77 245 212 / 22%);
        display: grid;
        gap: 8px;
        justify-items: center;
        margin: 0 auto;
        max-width: 520px;
        padding: 18px;
        text-align: center;
      }

      .architecture-core strong {
        color: var(--primary);
        font-size: 1.4rem;
      }

      .architecture-lanes {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .architecture-lane {
        background: rgb(6 9 13 / 64%);
        border: 1px solid var(--line);
        border-radius: 8px;
        display: grid;
        gap: 10px;
        padding: 14px;
      }

      .architecture-lane h2 {
        color: var(--primary);
        font-size: 0.98rem;
        margin: 0;
      }

      .architecture-node {
        background:
          none,
          rgb(12 18 25 / 88%);
        border: 1px solid rgb(77 245 212 / 18%);
        border-radius: 8px;
        padding: 12px;
      }

      .architecture-node strong {
        display: block;
        margin-bottom: 6px;
      }

      .architecture-node span {
        color: var(--muted);
        display: block;
        font-size: 0.82rem;
        line-height: 1.45;
      }

      .architecture-flow {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }

      .flow-step {
        background: rgb(77 245 212 / 8%);
        border: 1px solid rgb(77 245 212 / 24%);
        border-radius: 8px;
        padding: 12px;
        position: relative;
      }

      .flow-step:not(:last-child)::after {
        color: var(--primary);
        content: ">";
        font-weight: 900;
        position: absolute;
        right: -11px;
        top: 50%;
        transform: translateY(-50%);
      }

      .architecture-principles {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .future-chart-card {
        grid-column: 1 / -1;
        overflow: hidden;
        position: relative;
      }

      .future-chart-card::before {
        animation: chartGlow 5s ease-in-out infinite;
        background:
          none,
          none;
        content: "";
        inset: -30%;
        position: absolute;
        z-index: 0;
      }

      .future-chart {
        display: grid;
        gap: 18px;
        position: relative;
        z-index: 1;
      }

      .chart-stage {
        align-items: end;
        background:
          none,
          none,
          rgb(6 9 13 / 38%);
        background-size: 100% 25%, 12.5% 100%;
        border: 1px solid rgb(77 245 212 / 22%);
        border-radius: 8px;
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(8, minmax(0, 1fr));
        min-height: 260px;
        padding: 18px;
      }

      .chart-column {
        align-items: end;
        display: grid;
        gap: 8px;
        min-width: 0;
      }

      .chart-bar {
        animation: riseBar 900ms cubic-bezier(.2,.8,.2,1) both;
        background: none;
        border: 1px solid rgb(77 245 212 / 54%);
        border-radius: 8px 8px 3px 3px;
        box-shadow: 0 0 22px rgb(77 245 212 / 34%);
        min-height: 18px;
      }

      .chart-bar.warn {
        background: none;
        border-color: rgb(244 201 107 / 60%);
        box-shadow: 0 0 22px rgb(244 201 107 / 32%);
      }

      .chart-label {
        color: var(--muted);
        font-size: 0.78rem;
        overflow: hidden;
        text-align: center;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .chart-kpis {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .chart-kpi {
        background: rgb(255 255 255 / 4%);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
      }

      .chart-kpi span {
        color: var(--muted);
        display: block;
        font-size: 0.82rem;
        margin-bottom: 6px;
      }

      .chart-kpi strong {
        color: var(--primary);
        font-size: 1.45rem;
      }

      @keyframes riseBar {
        from {
          opacity: 0;
          transform: scaleY(.08);
          transform-origin: bottom;
        }
        to {
          opacity: 1;
          transform: scaleY(1);
          transform-origin: bottom;
        }
      }

      @keyframes chartGlow {
        0%, 100% { transform: translate3d(0, 0, 0) rotate(0deg); }
        50% { transform: translate3d(4%, -2%, 0) rotate(5deg); }
      }

      .empty {
        border: 1px dashed var(--line);
        border-radius: 8px;
        color: var(--muted);
        padding: 18px;
        text-align: center;
      }

        return `

              `).join("")}
            </select>

        `;
      }

      function applyTranslations(root = app) {
        const language = readLanguage();
        if (language === "pt") return;

        root.querySelectorAll("input[placeholder], textarea[placeholder]").forEach((field) => {
          field.placeholder = translateText(field.placeholder, language);
        });

        root.querySelectorAll("[aria-label], [title]").forEach((element) => {
          if (element.hasAttribute("aria-label")) {
            element.setAttribute("aria-label", translateText(element.getAttribute("aria-label"), language));
          }
          if (element.hasAttribute("title")) {
            element.setAttribute("title", translateText(element.getAttribute("title"), language));
          }
        });

        const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
          acceptNode(node) {
            const parent = node.parentElement;
            if (!parent || ["SCRIPT", "STYLE", "TEXTAREA", "OPTION"].includes(parent.tagName)) {
              return NodeFilter.FILTER_REJECT;
            }
            return node.nodeValue.trim() ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
          }
        });

        const nodes = [];
        while (walker.nextNode()) nodes.push(walker.currentNode);

        nodes.forEach((node) => {
          const original = node.nodeValue;
          const translated = translateText(original, language);
          if (translated !== original) {
            node.nodeValue = original.replace(original.trim(), translated);
          }
        });

        root.querySelectorAll("option").forEach((option) => {
          option.textContent = translateText(option.textContent, language);
        });
      }

      function bindLanguageSelectors() {
        document.querySelectorAll("[data-language-select]").forEach((select) => {

          .replaceAll("'", "&#039;");

        if (text.includes("bem") || text.includes("melhor") || text.includes("otim")) {

        return "Obrigado por me contar. Quer registrar também nível de dor, inchaço, energia ou alguma observação do dia?";
      }

        if (session.role === "PROFESSIONAL") {
          return state.patients.filter((patient) =>

        }

        return state.patients.filter((patient) => patient.tenantId === tenantId);

      }

      function homeModulesForSession(session) {
        const modules = [
          { view: "dashboard", icon: "dashboard", title: "Meu Dashboard", detail: "Alertas, tarefas e Assistente Rachel em linguagem natural." },
          { view: "timeline", icon: "timeline", title: "Linha do tempo", detail: "Calendário clínico com sintomas, medidas, tarefas e alertas." },
          { view: "tasks", icon: "tasks", title: "Tarefas", detail: "Exames, retornos e pendências clínicas priorizadas." },
          { view: "patients", icon: "patients", title: "Pacientes", detail: "Cadastro universal com campos personalizados por médico." },
          { view: "symptoms", icon: "symptoms", title: "Sintomas", detail: "Registro de dor, observações e evolução clínica." },
          { view: "measurements", icon: "measurements", title: "Medidas", detail: "Peso, cintura, quadril e acompanhamento corporal." },
          { view: "imageBank", icon: "images", title: "Banco de imagens", detail: "Biblioteca de fundos dos topos para super admins." },
          { view: "language", icon: "language", title: "Idioma", detail: "Preferência de idioma para interface e dados do sistema." },
          { view: "institutions", icon: "institutions", title: "Instituições", detail: "Instituições e parceiros vinculados ao tenant." },
          { view: "doctors", icon: "doctors", title: "Médicos", detail: "Equipe médica e especialidades por clínica." },
          { view: "audit", icon: "audit", title: "Auditoria", detail: "Rastreabilidade de ações e eventos sensíveis." },
          { view: "architecture", icon: "architecture", title: "Arquitetura", detail: "Mapa macro dos módulos, conexões e regras do produto." },
          { view: "admin", icon: "admin", title: "Gestão", detail: "Clínicas, médicos e instituições vinculadas ao tenant." }
        ];

        if (session.role === "PATIENT") {
          return modules.filter((module) => ["dashboard", "timeline", "symptoms", "measurements", "tasks", "language", "architecture"].includes(module.view));
        }

        const hideSidebar = () => {
          setSidebarHidden(true);
          document.body.classList.remove("sidebar-open");
          render();
        };

        document.querySelectorAll("[data-hide-sidebar]").forEach((button) => {
          button.addEventListener("click", hideSidebar);
        });

        document.getElementById("sidebar-restore")?.addEventListener("click", () => {
          setSidebarHidden(false);
          render();
        });

        if (session.role === "ADMIN") return modules;

        return modules.filter((module) => module.view !== "imageBank");
      }

      function renderHome(state, session) {
        const patients = scopedPatients(state, session);
        const openAlerts = [...state.examAlerts, ...state.returnAlerts].filter((alert) => alert.status !== "Resolvido").length;
        const templates = customTemplatesForDoctor(state, tenantIdForSession(session), doctorIdForSession(session)).length;
        const modules = homeModulesForSession(session);
        const secondaryView = modules.some((module) => module.view === "patients") ? "patients" : "symptoms";
        const secondaryLabel = secondaryView === "patients" ? "Ver pacientes" : "Registrar sintomas";

        return `
          <section class="home-hero">
            <div class="home-hero-content">
              <p class="eyebrow">LipeCare Home</p>
              <h1>Cuidado clínico conectado.</h1>
              <p class="muted">Acesso rápido aos módulos centrais, indicadores assistenciais e ferramentas de acompanhamento do paciente.</p>
              <div class="home-actions">
                <button class="btn" type="button" data-view="dashboard">Abrir Meu Dashboard</button>
                <button class="btn secondary" type="button" data-view="${secondaryView}">${secondaryLabel}</button>
              </div>
            </div>
          </section>

          <section class="home-highlights">
            <div class="home-highlight"><strong>${patients.length}</strong><span>Pacientes acompanhados</span></div>
            <div class="home-highlight"><strong>${openAlerts}</strong><span>Alertas ativos</span></div>
            <div class="home-highlight"><strong>${templates}</strong><span>Templates médicos</span></div>
            <div class="home-highlight"><strong>#${BUILD_INFO.deployNumber}</strong><span>Deploy publicado</span></div>
          </section>

          <section class="card section" style="margin-top: 16px;">
            <h2>Módulos e atalhos</h2>
            <div class="module-grid">
              ${modules.map((module) => `
                <button class="module-thumb" type="button" data-view="${module.view}">
                  ${renderModuleIcon(module.icon)}
                  <strong>${module.title}</strong>
                  <span>${module.detail}</span>
                </button>
              `).join("")}
            </div>
          </section>
        `;
      }

      function scopedTasks(state, session) {
        const patients = scopedPatients(state, session);
        const patientIds = patients.map((patient) => patient.id);
        return [...state.examAlerts, ...state.returnAlerts]
          .filter((task) => patientIds.includes(task.patientId))
          .map((task) => ({
            ...task,
            patient: state.patients.find((patient) => patient.id === task.patientId),
            kind: state.examAlerts.some((item) => item.id === task.id) ? "Exame" : "Retorno"
          }))
          .sort((a, b) => String(a.dueDate).localeCompare(String(b.dueDate)));
      }

      function renderTaskList(tasks, emptyMessage = "Nenhuma tarefa encontrada.") {
        if (!tasks.length) return empty(emptyMessage);

        return `
          <div class="task-list">
            ${tasks.map((task) => `
              <div class="task-item">
                <strong>${task.title}</strong>
                <p class="muted">${task.kind} - ${task.patient?.fullName ?? "Paciente"} - ${task.dueDate}</p>
                <p>${task.detail}</p>
                <span class="pill ${task.priority === "Alta" ? "warn" : "ok"}">${task.priority}</span>
                <span class="pill ${task.status === "Resolvido" ? "ok" : "warn"}">${task.status}</span>
                ${task.status !== "Resolvido" ? `<button class="btn secondary" type="button" data-resolve-alert="${task.id}">Resolver</button>` : ""}
              </div>
            `).join("")}
          </div>
        `;
      }

      function renderDashboard(state, session) {
        const patients = scopedPatients(state, session);
        const symptoms = state.symptoms.filter((item) => patients.some((patient) => patient.id === item.patientId));
        const measurements = state.measurements.filter((item) => patients.some((patient) => patient.id === item.patientId));
        const photos = state.photos.filter((item) => patients.some((patient) => patient.id === item.patientId));
        const highPain = symptoms.filter((item) => Number(item.painLevel) >= 7).length;
        const tasks = scopedTasks(state, session);
        const openTasks = tasks.filter((task) => task.status !== "Resolvido");

        return `
          ${renderHeader("Meu Dashboard", "Alertas, tarefas e Assistente Rachel para acompanhamento clínico.", roleLabel(session.role))}
          <section class="grid stats">
            ${statCard("Pacientes", patients.length)}
            ${statCard("Registros de sintomas", symptoms.length)}
            ${statCard("Medidas", measurements.length)}
            ${statCard("Tarefas abertas", openTasks.length)}
          </section>
          <section class="grid content-grid">
            ${session.role === "PROFESSIONAL" ? renderProfessionalChart(state, patients, symptoms, measurements) : ""}
            <article class="card section">
              <h2>Fila de acompanhamento</h2>
              ${patients.length ? renderPatientTable(patients, state.selectedPatientId) : empty("Nenhum paciente encontrado.")}
            </article>
            <article class="card section">
              <h2>Alertas</h2>
              <div class="stack">
                <div class="alert">${highPain} registro(s) com dor elevada exigem revisao.</div>
                <div class="timeline">
                  ${state.auditLogs.slice(0, 4).map((log) => `
                    <div class="timeline-item">
                      <strong>${log.action}</strong>
                      <p class="muted">${log.actor} - ${log.resource} - ${log.date}</p>
                    </div>
                  `).join("")}
                </div>
              </div>
            </article>
            <article class="card section">
              <h2>Tarefas</h2>
              ${renderTaskList(openTasks.slice(0, 4), "Nenhuma tarefa aberta.")}
            </article>
            ${renderAssistant(state)}
          </section>
        `;
      }

      function renderProfessionalChart(state, patients, symptoms, measurements) {
        const series = [
          { label: "Dor", value: Math.min(92, 38 + symptoms.length * 9), tone: "warn" },
          { label: "Medidas", value: Math.min(88, 42 + measurements.length * 8), tone: "" },
          { label: "Check-ins", value: 76, tone: "" },
          { label: "Retornos", value: Math.min(84, 46 + state.returnAlerts.length * 10), tone: "warn" },
          { label: "Exames", value: Math.min(86, 44 + state.examAlerts.length * 10), tone: "warn" },
          { label: "Fotos", value: Math.min(80, 36 + state.photos.length * 11), tone: "" },
          { label: "Adesao", value: 69, tone: "" },
          { label: "Risco", value: 52, tone: "warn" }
        ];
        const openAlerts = [...state.examAlerts, ...state.returnAlerts].filter((alert) => alert.status !== "Resolvido").length;

        return `
          <article class="card section future-chart-card">
            <div class="future-chart">
              <div>
                <p class="eyebrow">Radar clínico em tempo real</p>
                <h2>Evolução inteligente dos pacientes</h2>
                <p class="muted">Visão animada para priorizar dor, exames, retornos e engajamento.</p>
              </div>
              <div class="chart-stage" aria-label="Gráfico futurista de acompanhamento">
                ${series.map((item, index) => `
                  <div class="chart-column">
                    <div class="chart-bar ${item.tone}" style="height: ${item.value}%; animation-delay: ${index * 90}ms"></div>
                    <div class="chart-label">${item.label}</div>
                  </div>
                `).join("")}
              </div>
              <div class="chart-kpis">
                <div class="chart-kpi"><span>Pacientes ativos</span><strong>${patients.length}</strong></div>
                <div class="chart-kpi"><span>Alertas abertos</span><strong>${openAlerts}</strong></div>
                <div class="chart-kpi"><span>Índice de adesão</span><strong>69%</strong></div>
              </div>
            </div>
          </article>
        `;
      }

      function renderAssistant(state) {
        return `
          <article class="card section assistant-card">
            <h2>Assistente Rachel</h2>
            <div class="assistant-chat">
              <div class="assistant-messages" id="assistant-messages">
                ${state.assistantMessages.map((message) => `
                  <div class="assistant-message ${message.role}">
                    ${escapeHtml(message.text)}
                  </div>
                `).join("")}
              </div>
              <form class="assistant-form" id="assistant-form">
                <input name="message" autocomplete="off" placeholder="Pergunte em linguagem natural sobre pacientes, sintomas, medidas ou tarefas..." />
                <button class="btn" type="submit">Enviar</button>
              </form>
            </div>
          </article>
        `;
      }

      function statCard(label, value) {
        return `
          <article class="card stat">
            <span>${label}</span>
            <strong>${value}</strong>
          </article>
        `;
      }

      function renderTimeline(state, session) {
        const patients = scopedPatients(state, session);
        const patientIds = patients.map((patient) => patient.id);
        const symptoms = state.symptoms.filter((item) => patientIds.includes(item.patientId));
        const measurements = state.measurements.filter((item) => patientIds.includes(item.patientId));
        const tasks = scopedTasks(state, session);
        const events = [
          ...symptoms.map((item) => ({ date: item.date, type: "symptom", title: `Dor ${item.painLevel}/10`, detail: item.notes })),
          ...measurements.map((item) => ({ date: item.date, type: "measurement", title: `${item.weightKg} kg`, detail: `Cintura ${item.waistCm} cm, quadril ${item.hipCm} cm` })),
          ...tasks.map((item) => ({ date: item.dueDate, type: "task", title: item.title, detail: `${item.kind} - ${item.patient?.fullName ?? "Paciente"}` }))
        ].sort((a, b) => String(a.date).localeCompare(String(b.date)));
        const calendarDays = Array.from({ length: 28 }, (_, index) => {
          const day = index + 1;
          const markers = events.filter((event) => Number(String(event.date).slice(-2)) === day).slice(0, 3);
          return { day, markers };
        });
        const chartValues = [44, 58, 36, 72, 64, 80, 54, 68];

        return `
          ${renderHeader("Linha do tempo", "Calendário clínico com sintomas, medidas, tarefas e alertas.", "Módulo clínico")}
          <section class="timeline-board">
            <article class="card section">
              <h2>Calendário operacional</h2>
              <div class="timeline-calendar">
                ${calendarDays.map((cell) => `
                  <div class="calendar-cell">
                    <strong>${cell.day}</strong>
                    ${cell.markers.map((marker) => `<span class="calendar-dot ${marker.type}" title="${marker.title}"></span>`).join("")}
                  </div>
                `).join("")}
              </div>
            </article>
            <article class="card section">
              <h2>Sinais do período</h2>
              <div class="signal-chart">
                ${chartValues.map((value) => `<div class="signal-bar" style="height: ${value}%"></div>`).join("")}
              </div>
              <div class="stack" style="margin-top: 16px;">
                ${events.slice(0, 6).map((event) => `
                  <div class="timeline-item">
                    <strong>${event.date} - ${event.title}</strong>
                    <p class="muted">${event.detail}</p>
                  </div>
                `).join("")}
              </div>
            </article>
          </section>
        `;
      }

      function renderTasks(state, session) {
        const tasks = scopedTasks(state, session);
        const openTasks = tasks.filter((task) => task.status !== "Resolvido");

        return `
          ${renderHeader("Tarefas", "Exames, retornos, pendências e próximos passos do acompanhamento.", "Operação")}
          <section class="grid stats">
            ${statCard("Tarefas abertas", openTasks.length)}
            ${statCard("Alta prioridade", openTasks.filter((task) => task.priority === "Alta").length)}
            ${statCard("Retornos", tasks.filter((task) => task.kind === "Retorno").length)}
            ${statCard("Exames", tasks.filter((task) => task.kind === "Exame").length)}
          </section>
          <section class="grid content-grid">
            <article class="card section">
              <h2>Fila de tarefas</h2>
              ${renderTaskList(tasks)}
            </article>
            <article class="card section">
              <h2>Criar tarefa clínica</h2>
              <form id="return-alert-form" class="form">
                <label>Paciente ${renderPatientSelect(state, session)}</label>
                <label>Tarefa <input name="title" value="Novo acompanhamento clínico" required /></label>
                <label>Data <input name="dueDate" type="date" value="${today()}" required /></label>
                <label>Resumo <textarea name="detail" required></textarea></label>
                <button class="btn" type="submit">Criar tarefa</button>
              </form>
            </article>
          </section>
        `;
      }

      function renderLanguageSettings() {
        const state = readState();
        return `
          ${renderHeader("Idioma", "Preferência de idioma para interface, dados do sistema e rotinas operacionais.", "Configurações")}
          <section class="settings-grid">
            <article class="card section">
              <h2>Idioma da interface</h2>
              ${renderLanguageSelector()}
              <div class="alert">Esta seleção atualiza os rótulos visíveis da aplicação. A próxima fase deve levar a mesma preferência para dados persistidos e backend.</div>
            </article>
            <article class="card section">
              <h2>Cobertura atual</h2>
              <div class="task-list">
                <div class="task-item"><strong>Português</strong><p class="muted">Idioma base do produto.</p></div>
                <div class="task-item"><strong>English, Español, 日本語, Deutsch</strong><p class="muted">Traduções de interface habilitadas no seletor.</p></div>
              </div>
            </article>
            <article class="card section assistant-card">
              <h2>Tema e cor de destaque</h2>
              <form id="accent-form" class="form">
                <label>Cor principal
                  <input name="accentColor" type="color" value="${state.accentColor || INITIAL_STATE.accentColor}" />
                </label>
                <div class="alert">A base visual permanece em tons de cinza. Esta cor controla apenas destaques, botões, linhas ativas e estados selecionados.</div>
                <button class="btn" type="submit">Salvar cor de destaque</button>
              </form>
            </article>
          </section>
        `;
      }

      function renderImageBank(state) {
        const images = allHeroImages(state);
        const selected = selectedHeroImage(state);

        return `
          ${renderHeader("Banco de imagens", "Biblioteca de fundos dos topos para super admins.", "Super admin")}
          <section class="grid">
            <article class="card section">
              <h2>Imagem ativa dos topos</h2>
              <div class="image-bank-actions">
                <div>
                  <strong>${selected.name}</strong>
                  <p class="muted">Aplicada na Home e nos cabeçalhos compactos das sessões.</p>
                </div>
                <div>
                  <span class="badge">Posição: ${HERO_POSITIONS[state.heroImagePosition] ?? "Centro"}</span>
                </div>
              </div>
              <div class="position-control" style="margin-top: 14px;">
                ${Object.entries(HERO_POSITIONS).map(([position, label]) => `
                  <button class="btn ${state.heroImagePosition === position ? "" : "secondary"}" type="button" data-hero-position="${position}">${label}</button>
                `).join("")}
              </div>
            </article>

            <article class="card section">
              <h2>Enviar nova imagem</h2>
              <form id="hero-upload-form" class="form">
                <label>Nome da imagem <input name="name" placeholder="Ex.: Campanha clínica premium" required /></label>
                <label>Arquivo <input name="file" type="file" accept="image/png,image/jpeg,image/webp" required /></label>
                <div class="alert">No MVP o upload fica salvo neste navegador. Em produção, esta função deve apontar para storage privado e banco de dados.</div>
                <button class="btn" type="submit">Adicionar ao banco</button>
              </form>
            </article>

            <article class="card section">
              <h2>Biblioteca</h2>
              <div class="image-bank-grid">
                ${images.map((image) => `
                  <button class="image-bank-card ${image.id === state.heroImageId ? "active" : ""}" type="button" data-hero-image="${image.id}">
                    <img src="${image.url}" alt="${image.name}" />
                    <strong>${image.name}</strong>
                    <span class="muted">${image.custom ? "Upload do sistema" : "Banco padrão"}</span>
                  </button>
                `).join("")}
              </div>
            </article>
          </section>
        `;

      function renderInstitutions(state) {
        return `
          ${renderHeader("Instituições", "Instituições, parceiros e estruturas vinculadas ao tenant.", "Configurações")}
          <section class="card section">
            <h2>Instituições cadastradas</h2>
            <div class="table-wrap">
              <table>
                <thead><tr><th>Instituição</th><th>Tipo</th><th>Cidade</th></tr></thead>
                <tbody>
                  ${state.institutions.map((institution) => `
                    <tr><td>${institution.name}</td><td>${institution.type}</td><td>${institution.city}</td></tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          </section>
        `;
      }

      function renderDoctors(state) {
        return `
          ${renderHeader("Médicos", "Equipe médica, especialidades e vínculo com clínicas.", "Configurações")}
          <section class="card section">
            <h2>Médicos cadastrados</h2>
            <div class="table-wrap">
              <table>
                <thead><tr><th>Médico</th><th>Especialidade</th><th>Clínica</th></tr></thead>
                <tbody>
                  ${state.doctors.map((doctor) => `
                    <tr><td>${doctor.name}</td><td>${doctor.specialty}</td><td>${doctor.clinic}</td></tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          </section>
        `;
      }

      function renderPatients(state, session) {
        const patients = scopedPatients(state, session);
        const patient = selectedPatient(state, session);
        const activeTab = state.patientFormTab ?? "essential";

        return `
          ${renderHeader("Pacientes", "Cadastro base com campos personalizados por médico.", "CRM")}
          <section class="grid content-grid">
            <article class="card section">
              <h2>Lista de pacientes</h2>
              ${renderPatientTable(patients, state.selectedPatientId)}
            </article>
            <article class="card section">
              <h2>Novo paciente</h2>
              ${renderEssentialPatientForm("patient-form", {}, "Cadastrar paciente")}
            </article>
            ${patient ? renderPatientRecord(state, session, patient, activeTab) : ""}
          </section>
        `;
      }

      function renderPatientRecord(state, session, patient, activeTab) {
        return `
          <article class="card section patient-detail">
            <h2>Ficha do paciente</h2>
            <div class="tabs" role="tablist" aria-label="Abas da ficha do paciente">
              ${renderPatientTab("essential", "Dados Essenciais", activeTab)}
              ${renderPatientTab("custom", "Dados Personalizados", activeTab)}
              ${renderPatientTab("history", "Histórico", activeTab)}
            </div>
            ${activeTab === "custom"
              ? renderCustomPatientFields(state, session, patient)
              : activeTab === "history"
                ? renderClinicalRecord(patient)
                : renderEssentialPatientForm("patient-essential-form", patient, "Salvar dados essenciais")}
          </article>
        `;
      }

      function renderPatientTab(tab, label, activeTab) {
        return `<button class="tab-button ${activeTab === tab ? "active" : ""}" type="button" data-patient-tab="${tab}">${label}</button>`;
      }

      function renderEssentialPatientForm(formId, patient, actionLabel) {
        return `
          <form id="${formId}" class="form">
            <input name="patientId" type="hidden" value="${patient.id ?? ""}" />
            <label>Nome completo <input name="fullName" value="${patient.fullName ?? ""}" required /></label>
            <div class="two-cols">
              <label>CPF <input name="cpf" value="${patient.cpf ?? ""}" /></label>

      function doctorIdForSession(session) {
        return session.role === "PROFESSIONAL" ? session.id : "u-pro";
      }

      function tenantIdForSession(session) {
        return session.tenantId ?? "tenant-lipecare";
      }

      function customTemplatesForDoctor(state, tenantId, doctorId, includeInactive = false) {
        return (state.customFieldTemplates ?? [])
          .filter((field) =>
            (field.tenantId ?? "tenant-lipecare") === tenantId &&
            field.doctorId === doctorId &&
            (includeInactive || field.active)
          )
          .sort((a, b) => Number(a.displayOrder) - Number(b.displayOrder));
      }

      function customValueForField(state, tenantId, patientId, doctorId, fieldId) {
        return (state.customFieldValues ?? []).find((value) =>
          (value.tenantId ?? "tenant-lipecare") === tenantId &&
          value.patientId === patientId &&
          value.doctorId === doctorId &&
          value.customFieldId === fieldId
        )?.value ?? "";
      }

      function renderCustomPatientFields(state, session, patient) {
        const tenantId = tenantIdForSession(session);
        const doctorId = doctorIdForSession(session);
        const fields = customTemplatesForDoctor(state, tenantId, doctorId);
        const allFields = customTemplatesForDoctor(state, tenantId, doctorId, true);

        return `
          <div class="stack">
            <div class="alert">
              Campos personalizados são templates livres deste médico neste tenant. Eles aparecem em todos os pacientes atuais e futuros deste médico, sem afetar outros médicos.
            </div>
            ${session.role !== "PATIENT" ? renderCustomFieldManager(allFields, session) : ""}
            <form id="patient-custom-form" class="form">
              <input name="patientId" type="hidden" value="${patient.id}" />
              ${fields.length ? fields.map((field) => renderCustomFieldInput(field, customValueForField(state, tenantId, patient.id, doctorId, field.id))).join("") : empty("Nenhum template ativo para este médico. Crie qualquer campo em Gerenciar Campos Personalizados.")}
              ${fields.length ? `<button class="btn" type="submit">Salvar dados personalizados</button>` : ""}
            </form>
          </div>
        `;
      }

      function renderCustomFieldInput(field, value) {
        const required = field.required ? "required" : "";
        const help = field.helpText ? `<span class="field-help">${field.helpText}</span>` : "";
        const options = Array.isArray(field.options) ? field.options : [];

        if (field.fieldType === "long_text") {
          return `<label>${field.label}${help}<textarea name="custom_${field.id}" placeholder="${field.placeholder ?? ""}" ${required}>${value}</textarea></label>`;
        }

        if (field.fieldType === "number") {
          return `<label>${field.label}${help}<input name="custom_${field.id}" type="number" value="${value}" placeholder="${field.placeholder ?? ""}" ${required} /></label>`;
        }

        if (field.fieldType === "date") {
          return `<label>${field.label}${help}<input name="custom_${field.id}" type="date" value="${value}" ${required} /></label>`;
        }

        if (field.fieldType === "yes_no") {
          return `
            <label>${field.label}${help}
              <select name="custom_${field.id}" ${required}>
                ${["", "Sim", "Nao"].map((option) => `<option value="${option}" ${option === value ? "selected" : ""}>${option === "Nao" ? "Não" : option || "Selecione"}</option>`).join("")}
              </select>
            </label>
          `;
        }

        if (field.fieldType === "select" || field.fieldType === "multi_select") {
          return `
            <label>${field.label}${help}
              <select name="custom_${field.id}" ${field.fieldType === "multi_select" ? "multiple" : ""} ${required}>
                ${field.fieldType === "select" ? `<option value="">${field.placeholder || "Selecione"}</option>` : ""}
                ${options.map((option) => `<option value="${option}" ${String(value).split(", ").includes(option) ? "selected" : ""}>${option}</option>`).join("")}
              </select>
            </label>
          `;
        }

        if (field.fieldType === "checkbox") {
          return `<label><input name="custom_${field.id}" type="checkbox" value="Sim" ${value === "Sim" ? "checked" : ""} /> ${field.label}${help}</label>`;
        }

        if (field.fieldType === "upload_file") {
          return `<label>${field.label}${help}${value ? `<span class="field-help">Arquivo atual: ${value}</span>` : ""}<input name="custom_${field.id}" type="file" ${required} /></label>`;
        }

        const type = {
          email: "email",
          phone: "tel"
        }[field.fieldType] ?? "text";

        return `<label>${field.label}${help}<input name="custom_${field.id}" type="${type}" value="${value}" placeholder="${field.placeholder ?? ""}" ${required} /></label>`;
      }

      function renderCustomFieldManager(fields, session) {
        return `
          <div class="field-manager">
            <div>
              <h2>Gerenciar Templates De Campos</h2>
              <p class="muted">Crie qualquer campo adicional para ${session.role === "ADMIN" ? "o médico selecionado" : "sua ficha de pacientes"}. O template fica salvo para pacientes atuais e futuros deste médico dentro do tenant atual.</p>
            </div>
            ${fields.length ? fields.map((field) => `
              <div class="field-row">
                <div>
                  <strong>${field.displayOrder}. ${field.label}</strong>
                  <div class="field-help">${field.fieldType} ${field.required ? "- obrigatório" : ""} ${field.active ? "" : "- inativo"}</div>
                </div>
                <span class="pill ${field.active ? "ok" : "warn"}">${field.active ? "Ativo" : "Oculto"}</span>
                <div class="field-row-actions">
                  <button class="btn secondary" type="button" data-toggle-custom-field="${field.id}">${field.active ? "Desativar" : "Ativar"}</button>
                </div>
              </div>
            `).join("") : empty("Nenhum campo criado para este médico.")}
            <form id="custom-field-form" class="form">
              <div class="two-cols">
                <label>Nome do novo campo <input name="label" placeholder="Ex.: Objetivo do tratamento, Queixa principal, Código interno" required /></label>
                <label>Tipo de campo
                  <select name="fieldType" required>
                    <option value="short_text">Texto curto</option>
                    <option value="long_text">Texto longo</option>
                    <option value="number">Número</option>
                    <option value="date">Data</option>
                    <option value="yes_no">Sim / Não</option>
                    <option value="select">Lista suspensa</option>
                    <option value="multi_select">Múltipla escolha</option>
                    <option value="checkbox">Checkbox</option>
                    <option value="upload_file">Upload de arquivo</option>
                    <option value="phone">Telefone</option>
                    <option value="email">E-mail</option>
                  </select>
                </label>
              </div>
              <div class="two-cols">
                <label>Ordem <input name="displayOrder" type="number" min="1" value="${fields.length + 1}" required /></label>
                <label>Placeholder <input name="placeholder" placeholder="Texto de apoio no campo" /></label>
              </div>
              <label>Texto de ajuda <input name="helpText" placeholder="Orientação curta para preenchimento" /></label>
              <label>Opções, separadas por vírgula <input name="options" placeholder="Opção 1, Opção 2, Opção 3" /></label>
              <label><input name="required" type="checkbox" value="true" /> Campo obrigatório</label>
              <button class="btn" type="submit">Criar campo personalizado</button>
            </form>
          </div>
        `;
      }
