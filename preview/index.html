<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LipeCare MVP</title>
    <style>
      :root {
        --bg: #06090d;
        --surface: rgb(14 20 28 / 82%);
        --surface-strong: rgb(18 27 38 / 94%);
        --surface-soft: rgb(27 43 56 / 76%);
        --text: #eef7f6;
        --muted: #9db1b8;
        --line: rgb(167 243 208 / 14%);
        --primary: #4df5d4;
        --primary-dark: #16c8ae;
        --accent: #f4c96b;
        --danger: #fb7185;
        --ok: #7ddf9f;
        --glow: 0 0 44px rgb(77 245 212 / 24%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 12% 10%, rgb(77 245 212 / 15%), transparent 34rem),
          radial-gradient(circle at 85% 18%, rgb(244 201 107 / 11%), transparent 26rem),
          linear-gradient(135deg, #05070a 0%, #0a1118 48%, #07100f 100%);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
      }

      .app {
        background-image:
          linear-gradient(rgb(255 255 255 / 3%) 1px, transparent 1px),
          linear-gradient(90deg, rgb(255 255 255 / 3%) 1px, transparent 1px);
        background-size: 56px 56px;
        min-height: 100vh;
        position: relative;
      }

      .app::before {
        background: linear-gradient(180deg, rgb(255 255 255 / 7%), transparent);
        content: "";
        height: 1px;
        left: 0;
        position: fixed;
        right: 0;
        top: 0;
        z-index: 5;
      }

      .login-shell {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(340px, 0.9fr);
        min-height: 100vh;
      }

      .login-hero {
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 56px;
        position: relative;
      }

      .login-panel {
        align-items: center;
        backdrop-filter: blur(18px);
        background: linear-gradient(180deg, rgb(18 27 38 / 82%), rgb(9 14 20 / 70%));
        border-left: 1px solid var(--line);
        display: flex;
        padding: 32px;
      }

      .card {
        backdrop-filter: blur(18px);
        background:
          linear-gradient(145deg, rgb(255 255 255 / 8%), rgb(255 255 255 / 3%)),
          var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 24px 90px rgb(0 0 0 / 32%);
        position: relative;
      }

      .card::after {
        border-radius: inherit;
        box-shadow: inset 0 1px 0 rgb(255 255 255 / 10%);
        content: "";
        inset: 0;
        pointer-events: none;
        position: absolute;
      }

      .login-card {
        padding: 28px;
        width: 100%;
      }

      .eyebrow {
        color: var(--primary);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0;
        margin: 0 0 12px;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        font-size: clamp(2.4rem, 5vw, 5.2rem);
        letter-spacing: 0;
        line-height: 1;
        margin-bottom: 20px;
        text-wrap: balance;
      }

      .login-hero h1 {
        background: linear-gradient(92deg, #ffffff, #b8fff1 52%, #f4c96b);
        background-clip: text;
        color: transparent;
        max-width: 980px;
      }

      h2 {
        font-size: 1.35rem;
        margin-bottom: 12px;
      }

      h3 {
        font-size: 1rem;
        margin-bottom: 8px;
      }

      .muted {
        color: var(--muted);
        line-height: 1.6;
      }

      .form {
        display: grid;
        gap: 14px;
      }

      label {
        color: var(--muted);
        display: grid;
        gap: 7px;
        font-size: 0.92rem;
      }

      input,
      select,
      textarea {
        background: rgb(5 9 13 / 78%);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        min-height: 40px;
        padding: 10px 11px;
        width: 100%;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: rgb(77 245 212 / 64%);
        box-shadow: var(--glow);
        outline: none;
      }

      textarea {
        min-height: 82px;
        resize: vertical;
      }

      .btn {
        align-items: center;
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        border-radius: 6px;
        color: #04100e;
        cursor: pointer;
        display: inline-flex;
        font-weight: 800;
        justify-content: center;
        min-height: 42px;
        padding: 10px 14px;
        transition:
          transform 140ms ease,
          box-shadow 140ms ease;
      }

      .btn:hover {
        box-shadow: var(--glow);
        transform: translateY(-1px);
      }

      .btn.secondary {
        background: rgb(255 255 255 / 4%);
        border: 1px solid var(--line);
        color: var(--primary);
      }

      .btn.danger {
        background: var(--danger);
        color: #1f070b;
      }

      .sample-users {
        display: grid;
        gap: 8px;
        margin-top: 18px;
      }

      .sample-users button {
        background:
          linear-gradient(135deg, rgb(77 245 212 / 9%), transparent),
          var(--surface-soft);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        cursor: pointer;
        padding: 10px;
        text-align: left;
        transition:
          border-color 140ms ease,
          transform 140ms ease;
      }

      .sample-users button:hover {
        border-color: rgb(77 245 212 / 54%);
        transform: translateX(2px);
      }

      .shell {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        min-height: 100vh;
      }

      .mobile-topbar {
        display: none;
      }

      .sidebar {
        backdrop-filter: blur(20px);
        background: linear-gradient(180deg, rgb(10 16 23 / 88%), rgb(8 12 18 / 72%));
        border-right: 1px solid var(--line);
        padding: 24px;
        position: sticky;
        top: 0;
        height: 100vh;
      }

      .brand {
        align-items: center;
        display: flex;
        gap: 12px;
        margin-bottom: 24px;
      }

      .logo-slot {
        align-items: center;
        background: transparent;
        border: 1px solid rgb(255 255 255 / 10%);
        border-radius: 8px;
        display: inline-flex;
        flex: 0 0 auto;
        height: 46px;
        justify-content: center;
        overflow: hidden;
        padding: 0;
        width: 46px;
      }

      .logo-slot img {
        display: block;
        height: 86%;
        object-fit: contain;
        width: 86%;
      }

      .brand strong {
        display: block;
        font-size: 1.35rem;
        letter-spacing: 0;
      }

      .brand span {
        display: block;
      }

      .deploy-meta {
        border-left: 1px solid rgb(255 255 255 / 12%);
        color: var(--muted);
        display: grid;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 0.68rem;
        gap: 3px;
        line-height: 1.35;
        margin-top: 10px;
        padding-left: 10px;
      }

      .deploy-meta b {
        color: var(--accent);
        font-weight: 800;
      }

      .nav {
        display: grid;
        gap: 8px;
      }

      .nav button {
        background: rgb(255 255 255 / 2%);
        border: 1px solid transparent;
        border-radius: 6px;
        color: var(--muted);
        cursor: pointer;
        padding: 10px 12px;
        text-align: left;
        transition:
          background 140ms ease,
          border-color 140ms ease,
          color 140ms ease;
      }

      .nav button.active {
        background: linear-gradient(135deg, rgb(77 245 212 / 16%), rgb(255 255 255 / 4%));
        border-color: rgb(77 245 212 / 28%);
        color: var(--primary);
        font-weight: 800;
      }

      .nav button:hover {
        border-color: var(--line);
        color: var(--text);
      }

      .user-box {
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.9rem;
        margin-top: 24px;
        padding-top: 18px;
      }

      .main {
        padding: 30px;
      }

      .sidebar-backdrop {
        display: none;
      }

      .topbar {
        align-items: flex-start;
        display: flex;
        gap: 16px;
        justify-content: space-between;
        margin-bottom: 22px;
      }

      .badge {
        background: linear-gradient(135deg, rgb(77 245 212 / 14%), rgb(244 201 107 / 8%));
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--primary);
        display: inline-flex;
        font-size: 0.82rem;
        font-weight: 800;
        padding: 7px 10px;
      }

      .grid {
        display: grid;
        gap: 16px;
      }

      .stats {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .stat {
        padding: 18px;
        overflow: hidden;
      }

      .stat span {
        color: var(--muted);
        display: block;
        margin-bottom: 8px;
      }

      .stat strong {
        color: var(--accent);
        font-size: 2rem;
        text-shadow: 0 0 28px rgb(244 201 107 / 34%);
      }

      .content-grid {
        grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
        margin-top: 16px;
      }

      .section {
        padding: 18px;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        border-collapse: collapse;
        min-width: 720px;
        width: 100%;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 12px 8px;
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-size: 0.82rem;
        text-transform: uppercase;
      }

      tr.clickable {
        cursor: pointer;
      }

      tr.clickable:hover {
        background: rgb(77 245 212 / 8%);
      }

      .selected-row {
        background: rgb(77 245 212 / 12%);
      }

      .pill {
        border-radius: 999px;
        display: inline-flex;
        font-size: 0.78rem;
        font-weight: 800;
        padding: 5px 8px;
      }

      .pill.ok {
        background: rgb(125 223 159 / 14%);
        color: var(--ok);
      }

      .pill.warn {
        background: rgb(244 201 107 / 16%);
        color: var(--accent);
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .timeline {
        display: grid;
        gap: 10px;
      }

      .timeline-item {
        border-left: 3px solid var(--primary);
        padding-left: 12px;
      }

      .two-cols {
        display: grid;
        gap: 12px;
        grid-template-columns: 1fr 1fr;
      }

      .photo-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .photo-card {
        background:
          linear-gradient(135deg, rgb(77 245 212 / 18%), rgb(244 201 107 / 16%)),
          rgb(255 255 255 / 3%);
        border: 1px solid var(--line);
        border-radius: 8px;
        min-height: 110px;
        padding: 12px;
      }

      .alert {
        background: rgb(244 201 107 / 12%);
        border: 1px solid rgb(244 201 107 / 24%);
        border-radius: 8px;
        color: #ffe7a6;
        padding: 12px;
      }

      .assistant-card {
        grid-column: 1 / -1;
      }

      .assistant-chat {
        display: grid;
        gap: 12px;
      }

      .assistant-messages {
        display: grid;
        gap: 10px;
        max-height: 260px;
        overflow-y: auto;
      }

      .assistant-message {
        border: 1px solid var(--line);
        border-radius: 8px;
        line-height: 1.5;
        max-width: 78%;
        padding: 10px 12px;
      }

      .assistant-message.assistant {
        background: rgb(77 245 212 / 10%);
        color: var(--text);
      }

      .assistant-message.user {
        background: rgb(244 201 107 / 13%);
        justify-self: end;
      }

      .assistant-form {
        display: grid;
        gap: 10px;
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .assistant-form input {
        background: rgb(255 255 255 / 4%);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        font: inherit;
        min-height: 44px;
        padding: 10px 12px;
      }

      .audio-actions {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .audio-status {
        color: var(--accent);
        font-weight: 800;
      }

      .future-chart-card {
        grid-column: 1 / -1;
        overflow: hidden;
        position: relative;
      }

      .future-chart-card::before {
        animation: chartGlow 5s ease-in-out infinite;
        background:
          radial-gradient(circle at 18% 20%, rgb(77 245 212 / 24%), transparent 18rem),
          radial-gradient(circle at 82% 12%, rgb(244 201 107 / 18%), transparent 16rem);
        content: "";
        inset: -30%;
        position: absolute;
        z-index: 0;
      }

      .future-chart {
        display: grid;
        gap: 18px;
        position: relative;
        z-index: 1;
      }

      .chart-stage {
        align-items: end;
        background:
          linear-gradient(180deg, rgb(255 255 255 / 8%) 1px, transparent 1px),
          linear-gradient(90deg, rgb(255 255 255 / 6%) 1px, transparent 1px),
          rgb(6 9 13 / 38%);
        background-size: 100% 25%, 12.5% 100%;
        border: 1px solid rgb(77 245 212 / 22%);
        border-radius: 8px;
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(8, minmax(0, 1fr));
        min-height: 260px;
        padding: 18px;
      }

      .chart-column {
        align-items: end;
        display: grid;
        gap: 8px;
        min-width: 0;
      }

      .chart-bar {
        animation: riseBar 900ms cubic-bezier(.2,.8,.2,1) both;
        background: linear-gradient(180deg, var(--primary), rgb(77 245 212 / 16%));
        border: 1px solid rgb(77 245 212 / 54%);
        border-radius: 8px 8px 3px 3px;
        box-shadow: 0 0 22px rgb(77 245 212 / 34%);
        min-height: 18px;
      }

      .chart-bar.warn {
        background: linear-gradient(180deg, var(--accent), rgb(244 201 107 / 15%));
        border-color: rgb(244 201 107 / 60%);
        box-shadow: 0 0 22px rgb(244 201 107 / 32%);
      }

      .chart-label {
        color: var(--muted);
        font-size: 0.78rem;
        overflow: hidden;
        text-align: center;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .chart-kpis {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .chart-kpi {
        background: rgb(255 255 255 / 4%);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
      }

      .chart-kpi span {
        color: var(--muted);
        display: block;
        font-size: 0.82rem;
        margin-bottom: 6px;
      }

      .chart-kpi strong {
        color: var(--primary);
        font-size: 1.45rem;
      }

      @keyframes riseBar {
        from {
          opacity: 0;
          transform: scaleY(.08);
          transform-origin: bottom;
        }
        to {
          opacity: 1;
          transform: scaleY(1);
          transform-origin: bottom;
        }
      }

      @keyframes chartGlow {
        0%, 100% { transform: translate3d(0, 0, 0) rotate(0deg); }
        50% { transform: translate3d(4%, -2%, 0) rotate(5deg); }
      }

      .empty {
        border: 1px dashed var(--line);
        border-radius: 8px;
        color: var(--muted);
        padding: 18px;
        text-align: center;
      }

      @media (max-width: 980px) {
        .login-shell,
        .shell,
        .content-grid,
        .stats,
        .two-cols,
        .chart-kpis {
          grid-template-columns: 1fr;
        }

        .shell {
          display: block;
          padding-top: 72px;
        }

        .mobile-topbar {
          align-items: center;
          backdrop-filter: blur(18px);
          background: rgb(6 9 13 / 82%);
          border-bottom: 1px solid var(--line);
          display: flex;
          gap: 12px;
          height: 72px;
          justify-content: space-between;
          left: 0;
          padding: 12px 16px;
          position: fixed;
          right: 0;
          top: 0;
          z-index: 40;
        }

        .mobile-brand {
          align-items: center;
          display: flex;
          gap: 10px;
          min-width: 0;
        }

        .mobile-brand strong {
          display: block;
          font-size: 1rem;
        }

        .mobile-brand span {
          color: var(--muted);
          display: block;
          font-size: 0.78rem;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .mobile-brand .deploy-meta {
          display: none;
        }

        .menu-toggle {
          align-items: center;
          background: linear-gradient(135deg, rgb(77 245 212 / 18%), rgb(255 255 255 / 5%));
          border: 1px solid var(--line);
          border-radius: 8px;
          color: var(--primary);
          cursor: pointer;
          display: inline-flex;
          flex-direction: column;
          gap: 5px;
          height: 44px;
          justify-content: center;
          width: 44px;
        }

        .menu-toggle span {
          background: currentColor;
          border-radius: 999px;
          display: block;
          height: 2px;
          width: 18px;
        }

        .sidebar {
          border-bottom: 0;
          border-right: 1px solid var(--line);
          bottom: 0;
          height: 100vh;
          left: 0;
          max-width: 86vw;
          overflow-y: auto;
          position: fixed;
          top: 0;
          transform: translateX(-104%);
          transition: transform 180ms ease;
          width: 300px;
          z-index: 60;
        }

        body.sidebar-open .sidebar {
          transform: translateX(0);
        }

        .sidebar-backdrop {
          background: rgb(0 0 0 / 56%);
          bottom: 0;
          display: block;
          left: 0;
          opacity: 0;
          pointer-events: none;
          position: fixed;
          right: 0;
          top: 0;
          transition: opacity 180ms ease;
          z-index: 50;
        }

        body.sidebar-open .sidebar-backdrop {
          opacity: 1;
          pointer-events: auto;
        }

        .nav {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 620px) {
        .login-hero,
        .login-panel,
        .main,
        .sidebar {
          padding: 18px;
        }

        .topbar {
          flex-direction: column;
        }

        .nav {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

      const app = document.getElementById("app");

      function readState() {
        const stored = localStorage.getItem("lipecare-mvp-state");
        if (!stored) {
          localStorage.setItem("lipecare-mvp-state", JSON.stringify(INITIAL_STATE));
          return structuredClone(INITIAL_STATE);
        }

        const parsed = JSON.parse(stored);
        return {
          ...structuredClone(INITIAL_STATE),
          ...parsed,
          assistantMessages: parsed.assistantMessages?.length
            ? parsed.assistantMessages
            : structuredClone(INITIAL_STATE.assistantMessages)
        };
      }

      function writeState(nextState) {
        localStorage.setItem("lipecare-mvp-state", JSON.stringify(nextState));
      }

      function readSession() {
        const stored = localStorage.getItem("lipecare-mvp-session");
        return stored ? JSON.parse(stored) : null;
      }

      function setSession(user) {
        localStorage.setItem("lipecare-mvp-session", JSON.stringify(user));
      }

      function clearSession() {
        localStorage.removeItem("lipecare-mvp-session");
      }

      function roleLabel(role) {
        return {
          ADMIN: "Administrador",
          PROFESSIONAL: "Profissional",
          PATIENT: "Paciente"
        }[role];
      }

      function today() {
        return new Date().toISOString().slice(0, 10);
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function assistantReply(message) {
        const text = message.toLowerCase();
        if (text.includes("dor") || text.includes("inch") || text.includes("cans")) {
          return "Entendi. Vou registrar isso como um ponto de atencao. Se a dor estiver forte ou diferente do habitual, vale avisar sua profissional e evitar se automedicar.";
        }
        if (text.includes("bem") || text.includes("melhor") || text.includes("otim")) {
          return "Que bom saber. Mantenha sua rotina de cuidado e me conte se houve algo que ajudou hoje, como movimento leve, hidratacao ou descanso.";
        }
        if (text.includes("triste") || text.includes("ans") || text.includes("mal")) {
          return "Sinto muito que hoje esteja pesado. Vamos por partes: respire, acolha o que voce esta sentindo e registre um sintoma simples para sua equipe acompanhar.";
        }
        return "Obrigado por me contar. Quer registrar tambem nivel de dor, inchaco, energia ou alguma observacao do dia?";
      }

      function render() {
        const session = readSession();
        if (!session) {
          renderLogin();
          return;
        }

        renderShell(session);
      }

      function renderLogin() {
        app.innerHTML = `
          <main class="login-shell">
            <section class="login-hero">
              <p class="eyebrow">LipeCare MVP</p>
              <h1>Cuidado clinico continuo, seguro e humanizado.</h1>

                pacientes, sintomas, medidas, fotos evolutivas e auditoria.
              </p>

                Dados totalmente ficticios para teste. Nao inserir dados reais de pacientes neste preview.
              </div>
            </section>
            <section class="login-panel">
              <div class="login-card card">
                <p class="eyebrow">Acesso de teste</p>
                <h2>Entrar</h2>
                <form id="login-form" class="form">
                  <label>
                    E-mail
                    <input name="email" type="email" value="profissional@lipecare.test" autocomplete="email" />
                  </label>
                  <label>
                    Senha
                    <input name="password" type="password" value="123456" autocomplete="current-password" />
                  </label>
                  <button class="btn" type="submit">Acessar MVP</button>
                </form>
                <div class="sample-users">
                  ${SAMPLE_USERS.map((user) => `
                    <button type="button" data-login="${user.email}">
                      <strong>${roleLabel(user.role)}</strong><br />
                      ${user.email} / 123456
                    </button>
                  `).join("")}
                </div>
              </div>
            </section>
          </main>
        `;

        document.getElementById("login-form").addEventListener("submit", (event) => {
          event.preventDefault();
          const data = new FormData(event.currentTarget);
          const email = String(data.get("email")).trim().toLowerCase();
          const password = String(data.get("password"));
          const user = SAMPLE_USERS.find((item) => item.email === email && item.password === password);

          if (!user) {
            alert("Usuario de teste nao encontrado.");
            return;
          }

          setSession(user);
          render();
        });

        document.querySelectorAll("[data-login]").forEach((button) => {
          button.addEventListener("click", () => {
            const user = SAMPLE_USERS.find((item) => item.email === button.dataset.login);
            setSession(user);
            render();
          });
        });
      }

      function renderShell(session) {
        const state = readState();
        const views = allowedViews(session.role);
        if (!views.includes(state.activeView)) {
          state.activeView = views[0];
          writeState(state);
        }

        app.innerHTML = `
          <main class="shell">
            <header class="mobile-topbar">
              <div class="mobile-brand">
                ${renderLogoSlot()}
                <div>
                  <strong>LipeCare</strong>
                  <span>${roleLabel(session.role)} - ${session.name}</span>
                </div>
              </div>
              <button class="menu-toggle" id="menu-toggle" type="button" aria-label="Abrir menu" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
              </button>
            </header>
            <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
            <aside class="sidebar">
              <div class="brand">
                ${renderLogoSlot()}
                <div>
                  <strong>LipeCare</strong>
                  <span class="muted">MVP funcional</span>
                  ${renderDeployMeta()}
                </div>
              </div>
              <nav class="nav">
                ${views.map((view) => `
                  <button class="${state.activeView === view ? "active" : ""}" data-view="${view}">
                    ${viewTitle(view)}
                  </button>
                `).join("")}
              </nav>
              <div class="user-box">
                <strong>${session.name}</strong><br />
                ${roleLabel(session.role)}<br />
                ${session.email}
                <div style="margin-top: 14px;">
                  <button class="btn secondary" id="logout-btn" type="button">Sair</button>
                </div>
              </div>
            </aside>
            <section class="main">
              ${renderView(state, session)}
            </section>
          </main>
        `;

        document.querySelectorAll("[data-view]").forEach((button) => {
          button.addEventListener("click", () => {
            const nextState = readState();
            nextState.activeView = button.dataset.view;
            writeState(nextState);
            document.body.classList.remove("sidebar-open");
            render();
          });
        });

        const menuToggle = document.getElementById("menu-toggle");
        const sidebarBackdrop = document.getElementById("sidebar-backdrop");

        if (menuToggle) {
          menuToggle.addEventListener("click", () => {
            const isOpen = document.body.classList.toggle("sidebar-open");
            menuToggle.setAttribute("aria-expanded", String(isOpen));
          });
        }

        if (sidebarBackdrop) {
          sidebarBackdrop.addEventListener("click", () => {
            document.body.classList.remove("sidebar-open");
            menuToggle?.setAttribute("aria-expanded", "false");
          });
        }

        document.getElementById("logout-btn").addEventListener("click", () => {
          document.body.classList.remove("sidebar-open");
          clearSession();
          render();
        });

        bindViewEvents(session);
      }

      function allowedViews(role) {
        if (role === "PATIENT") return ["dashboard", "symptoms", "measurements", "photos"];
        if (role === "ADMIN") return ["dashboard", "alerts", "admin", "patients", "symptoms", "measurements", "photos", "audit"];
        return ["dashboard", "alerts", "patients", "symptoms", "measurements", "photos", "audit"];
      }

      function viewTitle(view) {
        return {
          dashboard: "Dashboard",
          patients: "Pacientes",
          symptoms: "Sintomas",
          measurements: "Medidas",
          photos: "Fotos",
          admin: "Gestao",
          alerts: "Alertas",
          audit: "Auditoria"
        }[view];
      }

      function renderView(state, session) {
        return {
          dashboard: renderDashboard,
          patients: renderPatients,
          symptoms: renderSymptoms,
          measurements: renderMeasurements,
          photos: renderPhotos,
          admin: renderAdminManagement,
          alerts: renderAlerts,
          audit: renderAudit
        }[state.activeView](state, session);
      }

      function scopedPatients(state, session) {
        if (session.role === "PATIENT") {
          return state.patients.filter((patient) => patient.id === session.patientId);
        }

        return state.patients;
      }

      function selectedPatient(state, session) {
        const patients = scopedPatients(state, session);
        return patients.find((patient) => patient.id === state.selectedPatientId) ?? patients[0];
      }

      function renderHeader(title, subtitle, badge) {
        return `
          <header class="topbar">
            <div>
              <p class="eyebrow">LipeCare</p>
              <h1>${title}</h1>
              <p class="muted">${subtitle}</p>
            </div>
            <span class="badge">${badge}</span>
          </header>
        `;
      }

      function renderLogoSlot() {
        return `
          <div class="logo-slot" aria-label="Logo LipeCare">
            <img src="assets/lipecare-logo.png" alt="LipeCare" />
          </div>
        `;
      }

      function shortCommit(value) {
        return value.length > 12 ? value.slice(0, 12) : value;
      }

      function renderDeployMeta() {
        return `
          <div class="deploy-meta" aria-label="Versao do deploy">
            <span>versao <b>v${BUILD_INFO.version}</b></span>
            <span>deploy <b>#${BUILD_INFO.deployNumber}</b></span>
            <span>commit <b>${shortCommit(BUILD_INFO.commit)}</b></span>
          </div>
        `;
      }

      function renderDashboard(state, session) {
        const patients = scopedPatients(state, session);
        const symptoms = state.symptoms.filter((item) => patients.some((patient) => patient.id === item.patientId));
        const measurements = state.measurements.filter((item) => patients.some((patient) => patient.id === item.patientId));
        const photos = state.photos.filter((item) => patients.some((patient) => patient.id === item.patientId));
        const highPain = symptoms.filter((item) => Number(item.painLevel) >= 7).length;

        return `
          ${renderHeader("Dashboard", "Resumo operacional do acompanhamento clinico.", roleLabel(session.role))}
          <section class="grid stats">
            ${statCard("Pacientes", patients.length)}
            ${statCard("Registros de sintomas", symptoms.length)}
            ${statCard("Medidas", measurements.length)}
            ${statCard("Fotos privadas", photos.length)}
          </section>
          <section class="grid content-grid">
            ${session.role === "PROFESSIONAL" ? renderProfessionalChart(state, patients, symptoms, measurements) : ""}
            <article class="card section">
              <h2>Fila de acompanhamento</h2>
              ${patients.length ? renderPatientTable(patients, state.selectedPatientId) : empty("Nenhum paciente encontrado.")}
            </article>
            <article class="card section">
              <h2>Alertas</h2>
              <div class="stack">
                <div class="alert">${highPain} registro(s) com dor elevada exigem revisao.</div>
                <div class="timeline">
                  ${state.auditLogs.slice(0, 4).map((log) => `
                    <div class="timeline-item">
                      <strong>${log.action}</strong>
                      <p class="muted">${log.actor} - ${log.resource} - ${log.date}</p>
                    </div>
                  `).join("")}
                </div>
              </div>
            </article>
            ${renderAssistant(state)}
          </section>
        `;
      }

      function renderProfessionalChart(state, patients, symptoms, measurements) {
        const series = [
          { label: "Dor", value: Math.min(92, 38 + symptoms.length * 9), tone: "warn" },
          { label: "Medidas", value: Math.min(88, 42 + measurements.length * 8), tone: "" },
          { label: "Check-ins", value: 76, tone: "" },
          { label: "Retornos", value: Math.min(84, 46 + state.returnAlerts.length * 10), tone: "warn" },
          { label: "Exames", value: Math.min(86, 44 + state.examAlerts.length * 10), tone: "warn" },
          { label: "Fotos", value: Math.min(80, 36 + state.photos.length * 11), tone: "" },
          { label: "Adesao", value: 69, tone: "" },
          { label: "Risco", value: 52, tone: "warn" }
        ];
        const openAlerts = [...state.examAlerts, ...state.returnAlerts].filter((alert) => alert.status !== "Resolvido").length;

        return `
          <article class="card section future-chart-card">
            <div class="future-chart">
              <div>
                <p class="eyebrow">Radar clinico em tempo real</p>
                <h2>Evolucao inteligente dos pacientes</h2>
                <p class="muted">Visao animada para priorizar dor, exames, retornos e engajamento.</p>
              </div>
              <div class="chart-stage" aria-label="Grafico futurista de acompanhamento">
                ${series.map((item, index) => `
                  <div class="chart-column">
                    <div class="chart-bar ${item.tone}" style="height: ${item.value}%; animation-delay: ${index * 90}ms"></div>
                    <div class="chart-label">${item.label}</div>
                  </div>
                `).join("")}
              </div>
              <div class="chart-kpis">
                <div class="chart-kpi"><span>Pacientes ativos</span><strong>${patients.length}</strong></div>
                <div class="chart-kpi"><span>Alertas abertos</span><strong>${openAlerts}</strong></div>
                <div class="chart-kpi"><span>Indice de adesao</span><strong>69%</strong></div>
              </div>
            </div>
          </article>
        `;
      }

      function renderAssistant(state) {
        return `
          <article class="card section assistant-card">
            <h2>Assistente de IA</h2>
            <div class="assistant-chat">
              <div class="assistant-messages" id="assistant-messages">
                ${state.assistantMessages.map((message) => `
                  <div class="assistant-message ${message.role}">
                    ${escapeHtml(message.text)}
                  </div>
                `).join("")}
              </div>
              <form class="assistant-form" id="assistant-form">
                <input name="message" autocomplete="off" placeholder="Como voce esta se sentindo hoje?" />
                <button class="btn" type="submit">Enviar</button>
              </form>
            </div>
          </article>
        `;
      }

      function statCard(label, value) {
        return `
          <article class="card stat">
            <span>${label}</span>
            <strong>${value}</strong>
          </article>
        `;
      }

      function renderPatients(state, session) {
        const patients = scopedPatients(state, session);
        const patient = selectedPatient(state, session);

        return `
          ${renderHeader("Pacientes", "Cadastro inicial e selecao de paciente para acompanhamento.", "MVP")}
          <section class="grid content-grid">
            <article class="card section">
              <h2>Lista de pacientes</h2>

              </form>
            </article>
            ${session.role === "PROFESSIONAL" && patient ? renderClinicalRecord(patient) : ""}
          </section>
        `;

      function renderClinicalRecord(patient) {
        return `

                  <div class="timeline-item">${item}</div>

                ${(patient.audioNotes ?? []).map((note) => `

      function renderPatientTable(patients, selectedId) {

            </table>

      function renderSymptoms(state, session) {

      function renderMeasurements(state, session) {

                        ${measurements.map((item) => `

      function renderPhotos(state, session) {
        const patient = selectedPatient(state, session);
        const photos = patient ? state.photos.filter((item) => item.patientId === patient.id) : [];

        return `
          ${renderHeader("Fotos evolutivas", "Preview de storage privado com registros simulados.", patient ? patient.fullName : "Sem paciente")}
          <section class="grid content-grid">
            <article class="card section">
              <h2>Galeria privada simulada</h2>
              ${photos.length ? `
                <div class="photo-grid">
                  ${photos.map((photo) => `
                    <div class="photo-card">
                      <strong>${photo.label}</strong>
                      <p class="muted">${photo.date}</p>
                      <span class="pill ok">URL assinada futura</span>
                    </div>
                  `).join("")}
                </div>
              ` : empty("Nenhuma foto registrada.")}
            </article>
            <article class="card section">
              <h2>Novo registro simulado</h2>
              <form id="photo-form" class="form">
                <label>Paciente ${renderPatientSelect(state, session)}</label>
                <label>Data <input name="date" type="date" value="${today()}" required /></label>
                <label>Descricao <input name="label" value="Registro evolutivo" required /></label>
                <div class="alert">No sistema real, arquivos vao para storage privado S3 com URL assinada.</div>
                <button class="btn" type="submit">Salvar registro</button>
              </form>
            </article>
          </section>
        `;
      }

      function renderAdminManagement(state) {
        return `
          ${renderHeader("Gestao administrativa", "Clinicas, medicos e instituicoes vinculadas ao LipeCare.", "Administrador")}
          <section class="grid content-grid">
            <article class="card section">
              <h2>Clinicas</h2>
              <div class="table-wrap">
                <table>
                  <thead><tr><th>Clinica</th><th>Cidade</th><th>Status</th></tr></thead>
                  <tbody>
                    ${state.clinics.map((clinic) => `
                      <tr><td>${clinic.name}</td><td>${clinic.city}</td><td>${clinic.status}</td></tr>
                    `).join("")}
                  </tbody>
                </table>
              </div>
            </article>
            <article class="card section">
              <h2>Medicos</h2>
              <div class="table-wrap">
                <table>
                  <thead><tr><th>Medico</th><th>Especialidade</th><th>Clinica</th></tr></thead>
                  <tbody>
                    ${state.doctors.map((doctor) => `
                      <tr><td>${doctor.name}</td><td>${doctor.specialty}</td><td>${doctor.clinic}</td></tr>
                    `).join("")}
                  </tbody>
                </table>
              </div>
            </article>
            <article class="card section assistant-card">
              <h2>Instituicoes</h2>
              <div class="table-wrap">
                <table>
                  <thead><tr><th>Instituicao</th><th>Tipo</th><th>Cidade</th></tr></thead>
                  <tbody>
                    ${state.institutions.map((institution) => `
                      <tr><td>${institution.name}</td><td>${institution.type}</td><td>${institution.city}</td></tr>
                    `).join("")}
                  </tbody>
                </table>
              </div>
            </article>
          </section>
        `;
      }

      function renderAlerts(state, session) {
        const patients = scopedPatients(state, session);
        const patientIds = patients.map((patient) => patient.id);
        const examAlerts = state.examAlerts.filter((alert) => patientIds.includes(alert.patientId));
        const returnAlerts = state.returnAlerts.filter((alert) => patientIds.includes(alert.patientId));

        return `
          ${renderHeader("Alertas", "Exames, pendencias e retornos clinicos.", roleLabel(session.role))}
          <section class="grid stats">
            ${statCard("Exames em aberto", examAlerts.filter((alert) => alert.status !== "Resolvido").length)}
            ${statCard("Retornos pendentes", returnAlerts.filter((alert) => alert.status !== "Resolvido").length)}
            ${statCard("Alta prioridade", [...examAlerts, ...returnAlerts].filter((alert) => alert.priority === "Alta").length)}
            ${statCard("Pacientes monitorados", patients.length)}
          </section>
          <section class="grid content-grid">
            <article class="card section">
              <h2>Alertas de exames</h2>
              ${renderAlertList(examAlerts, state)}
              <form id="exam-alert-form" class="form">
                <h2>Novo alerta de exame</h2>
                <label>Paciente ${renderPatientSelect(state, session)}</label>
                <label>Titulo <input name="title" value="Solicitar exame de retorno" required /></label>
                <label>Data limite <input name="dueDate" type="date" value="${today()}" required /></label>
                <label>Detalhe <textarea name="detail" required></textarea></label>
                <button class="btn" type="submit">Criar alerta</button>
              </form>
            </article>
            <article class="card section">
              <h2>Retornos</h2>
              ${renderAlertList(returnAlerts, state)}
              <form id="return-alert-form" class="form">
                <h2>Agendar retorno</h2>
                <label>Paciente ${renderPatientSelect(state, session)}</label>
                <label>Motivo <input name="title" value="Retorno de acompanhamento" required /></label>
                <label>Data <input name="dueDate" type="date" value="${today()}" required /></label>
                <label>Resumo <textarea name="detail" required></textarea></label>
                <button class="btn" type="submit">Agendar retorno</button>
              </form>
            </article>
          </section>
        `;
      }

      function renderAlertList(alerts, state) {
        if (!alerts.length) return empty("Nenhum alerta encontrado.");

        return `
          <div class="timeline">
            ${alerts.map((alert) => {
              const patient = state.patients.find((item) => item.id === alert.patientId);
              return `
                <div class="timeline-item">
                  <strong>${alert.title}</strong>
                  <p class="muted">${patient?.fullName ?? "Paciente"} - ${alert.dueDate}</p>
                  <p>${alert.detail}</p>
                  <span class="pill ${alert.priority === "Alta" ? "warn" : "ok"}">${alert.priority}</span>
                  <span class="pill ${alert.status === "Resolvido" ? "ok" : "warn"}">${alert.status}</span>
                  ${alert.status !== "Resolvido" ? `<button class="btn secondary" type="button" data-resolve-alert="${alert.id}">Resolver</button>` : ""}
                </div>
              `;
            }).join("")}
          </div>
        `;
      }

      function renderAudit(state) {
        return `
          ${renderHeader("Auditoria", "Eventos minimos para rastreabilidade de dados sensiveis.", "LGPD")}
          <section class="card section">
            <h2>Eventos recentes</h2>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr><th>Data</th><th>Acao</th><th>Ator</th><th>Recurso</th></tr>
                </thead>
                <tbody>
                  ${state.auditLogs.map((log) => `
                    <tr>
                      <td>${log.date}</td>
                      <td>${log.action}</td>
                      <td>${log.actor}</td>
                      <td>${log.resource}</td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          </section>
        `;
      }

      function renderPatientSelect(state, session) {
        const patients = scopedPatients(state, session);
        return `
          <select name="patientId" required>
            ${patients.map((patient) => `
              <option value="${patient.id}" ${patient.id === state.selectedPatientId ? "selected" : ""}>${patient.fullName}</option>
            `).join("")}
          </select>
        `;
      }

      function empty(message) {
        return `<div class="empty">${message}</div>`;
      }

      function bindViewEvents(session) {
        document.querySelectorAll("[data-select-patient]").forEach((row) => {
          row.addEventListener("click", () => {
            const state = readState();
            state.selectedPatientId = row.dataset.selectPatient;
            state.auditLogs.unshift({
              id: crypto.randomUUID(),
              action: "patient_record_viewed",
              actor: session.name,
              resource: state.patients.find((patient) => patient.id === row.dataset.selectPatient)?.fullName ?? "Paciente",
              date: new Date().toLocaleString("pt-BR")
            });
            writeState(state);
            render();
          });
        });

        const patientForm = document.getElementById("patient-form");
        if (patientForm) {
          patientForm.addEventListener("submit", (event) => {
            event.preventDefault();
            const data = new FormData(event.currentTarget);
            const state = readState();
            const patient = {
              id: crypto.randomUUID(),
              fullName: String(data.get("fullName")),
              age: Number(data.get("age")),
              phone: String(data.get("phone")),
              professional: "Dra. Raquel Peres",
              status: "Avaliação pendente",
              lastCheckin: today(),
              clinicalSummary: "Paciente novo aguardando primeira avaliacao clinica.",
              clinicalHistory: ["Cadastro criado para inicio do acompanhamento."],
              audioNotes: []
            };
            state.patients.unshift(patient);
            state.selectedPatientId = patient.id;
            state.auditLogs.unshift({
              id: crypto.randomUUID(),
              action: "patient_created",
              actor: session.name,
              resource: patient.fullName,
              date: new Date().toLocaleString("pt-BR")
            });
            writeState(state);
            render();
          });
        }

        const audioNoteForm = document.getElementById("audio-note-form");
        if (audioNoteForm) {
          audioNoteForm.addEventListener("submit", (event) => {
            event.preventDefault();
            const data = new FormData(event.currentTarget);
            const note = String(data.get("note")).trim();
            if (!note) return;

            const state = readState();
            const patient = state.patients.find((item) => item.id === state.selectedPatientId);
            if (!patient) return;

            patient.audioNotes = patient.audioNotes ?? [];
            patient.audioNotes.unshift({ text: note, date: new Date().toLocaleString("pt-BR") });
            patient.clinicalSummary = note.length > 130 ? `${note.slice(0, 130)}...` : note;
            state.auditLogs.unshift({
              id: crypto.randomUUID(),
              action: "clinical_audio_note_created",
              actor: session.name,
              resource: patient.fullName,
              date: new Date().toLocaleString("pt-BR")
            });
            writeState(state);
            render();
          });
        }

        const recordButton = document.getElementById("audio-record-btn");
        if (recordButton) {
          recordButton.addEventListener("click", () => {
            const status = document.getElementById("audio-status");
            const field = document.getElementById("audio-note-text");
            status.textContent = "Gravando simulacao de audio...";
            recordButton.textContent = "Parar gravacao";
            window.setTimeout(() => {
              field.value = "Nota de audio: paciente relata como se sentiu hoje, nivel de dor, inchaco e orientacoes combinadas na consulta.";
              status.textContent = "Audio transcrito automaticamente para revisao.";
              recordButton.textContent = "Gravar audio";
            }, 1400);
          });
        }

        document.querySelectorAll("[data-resolve-alert]").forEach((button) => {
          button.addEventListener("click", () => {
            const state = readState();
            const alert = [...state.examAlerts, ...state.returnAlerts].find((item) => item.id === button.dataset.resolveAlert);
            if (!alert) return;

            alert.status = "Resolvido";
            state.auditLogs.unshift({
              id: crypto.randomUUID(),
              action: "clinical_alert_resolved",
              actor: session.name,
              resource: alert.title,
              date: new Date().toLocaleString("pt-BR")
            });
            writeState(state);
            render();
          });
        });

        bindAlertForm("exam-alert-form", "examAlerts", "exam_alert_created", session);
        bindAlertForm("return-alert-form", "returnAlerts", "return_alert_created", session);

        const assistantForm = document.getElementById("assistant-form");
        if (assistantForm) {
          assistantForm.addEventListener("submit", (event) => {
            event.preventDefault();
            const data = new FormData(event.currentTarget);
            const text = String(data.get("message")).trim();
            if (!text) return;

            const state = readState();
            state.assistantMessages.push({ role: "user", text, date: new Date().toLocaleString("pt-BR") });
            state.assistantMessages.push({
              role: "assistant",
              text: assistantReply(text),
              date: new Date().toLocaleString("pt-BR")
            });
            writeState(state);
            render();
          });
        }

        bindRecordForm("symptom-form", (state, data) => {
          const patient = state.patients.find((item) => item.id === String(data.get("patientId")));
          state.symptoms.unshift({
            id: crypto.randomUUID(),
            patientId: String(data.get("patientId")),
            date: String(data.get("date")),
            painLevel: Number(data.get("painLevel")),
            notes: String(data.get("notes"))
          });
          state.selectedPatientId = String(data.get("patientId"));
          return ["symptom_record_created", patient?.fullName ?? "Paciente"];
        }, session);

        bindRecordForm("measurement-form", (state, data) => {
          const patient = state.patients.find((item) => item.id === String(data.get("patientId")));
          state.measurements.unshift({
            id: crypto.randomUUID(),
            patientId: String(data.get("patientId")),
            date: String(data.get("date")),
            weightKg: Number(data.get("weightKg")),
            waistCm: Number(data.get("waistCm")),
            hipCm: Number(data.get("hipCm"))
          });
          state.selectedPatientId = String(data.get("patientId"));
          return ["measurement_record_created", patient?.fullName ?? "Paciente"];
        }, session);

        bindRecordForm("photo-form", (state, data) => {
          const patient = state.patients.find((item) => item.id === String(data.get("patientId")));
          state.photos.unshift({
            id: crypto.randomUUID(),
            patientId: String(data.get("patientId")),
            date: String(data.get("date")),
            label: String(data.get("label"))
          });
          state.selectedPatientId = String(data.get("patientId"));
          return ["photo_record_created", patient?.fullName ?? "Paciente"];
        }, session);
      }

      function bindRecordForm(formId, mutate, session) {
        const form = document.getElementById(formId);
        if (!form) return;

        form.addEventListener("submit", (event) => {
          event.preventDefault();
          const data = new FormData(event.currentTarget);
          const state = readState();
          const [action, resource] = mutate(state, data);
          state.auditLogs.unshift({
            id: crypto.randomUUID(),
            action,
            actor: session.name,
            resource,
            date: new Date().toLocaleString("pt-BR")
          });
          writeState(state);
          render();
        });
      }

      function bindAlertForm(formId, collectionName, action, session) {
        const form = document.getElementById(formId);
        if (!form) return;

        form.addEventListener("submit", (event) => {
          event.preventDefault();
          const data = new FormData(event.currentTarget);
          const state = readState();
          const patientId = String(data.get("patientId"));
          const patient = state.patients.find((item) => item.id === patientId);
          state[collectionName].unshift({
            id: crypto.randomUUID(),
            patientId,
            title: String(data.get("title")),
            dueDate: String(data.get("dueDate")),
            priority: "Media",
            status: collectionName === "returnAlerts" ? "Agendado" : "Aberto",
            detail: String(data.get("detail"))
          });
          state.selectedPatientId = patientId;
          state.auditLogs.unshift({
            id: crypto.randomUUID(),
            action,
            actor: session.name,
            resource: patient?.fullName ?? "Paciente",
            date: new Date().toLocaleString("pt-BR")
          });
          writeState(state);
          render();
        });
      }

      render();
    </script>
  </body>
</html>
