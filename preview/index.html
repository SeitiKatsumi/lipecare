<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LipeCare MVP</title>
    <style>
      :root {
        --bg: #06090d;
        --surface: rgb(14 20 28 / 82%);
        --surface-strong: rgb(18 27 38 / 94%);
        --surface-soft: rgb(27 43 56 / 76%);
        --text: #eef7f6;
        --muted: #9db1b8;
        --line: rgb(167 243 208 / 14%);
        --primary: #4df5d4;
        --primary-dark: #16c8ae;
        --accent: #f4c96b;
        --danger: #fb7185;
        --ok: #7ddf9f;
        --glow: 0 0 44px rgb(77 245 212 / 24%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 12% 10%, rgb(77 245 212 / 15%), transparent 34rem),
          radial-gradient(circle at 85% 18%, rgb(244 201 107 / 11%), transparent 26rem),
          linear-gradient(135deg, #05070a 0%, #0a1118 48%, #07100f 100%);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
      }

      .app {
        background-image:
          linear-gradient(rgb(255 255 255 / 3%) 1px, transparent 1px),
          linear-gradient(90deg, rgb(255 255 255 / 3%) 1px, transparent 1px);
        background-size: 56px 56px;
        min-height: 100vh;
        position: relative;
      }

      .app::before {
        background: linear-gradient(180deg, rgb(255 255 255 / 7%), transparent);
        content: "";
        height: 1px;
        left: 0;
        position: fixed;
        right: 0;
        top: 0;
        z-index: 5;
      }

      .login-shell {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(340px, 0.9fr);
        min-height: 100vh;
      }

      .login-hero {
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 56px;
        position: relative;
      }

      .login-panel {
        align-items: center;
        backdrop-filter: blur(18px);
        background: linear-gradient(180deg, rgb(18 27 38 / 82%), rgb(9 14 20 / 70%));
        border-left: 1px solid var(--line);
        display: flex;
        padding: 32px;
      }

      .card {
        backdrop-filter: blur(18px);
        background:
          linear-gradient(145deg, rgb(255 255 255 / 8%), rgb(255 255 255 / 3%)),
          var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 24px 90px rgb(0 0 0 / 32%);
        position: relative;
      }

      .card::after {
        border-radius: inherit;
        box-shadow: inset 0 1px 0 rgb(255 255 255 / 10%);
        content: "";
        inset: 0;
        pointer-events: none;
        position: absolute;
      }

      .login-card {
        padding: 28px;
        width: 100%;
      }

      .eyebrow {
        color: var(--primary);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0;
        margin: 0 0 12px;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        font-size: clamp(2.4rem, 5vw, 5.2rem);
        letter-spacing: 0;
        line-height: 1;
        margin-bottom: 20px;
        text-wrap: balance;
      }

      .login-hero h1 {
        background: linear-gradient(92deg, #ffffff, #b8fff1 52%, #f4c96b);
        background-clip: text;
        color: transparent;
        max-width: 980px;
      }

      h2 {
        font-size: 1.35rem;
        margin-bottom: 12px;
      }

      h3 {
        font-size: 1rem;
        margin-bottom: 8px;
      }

      .muted {
        color: var(--muted);
        line-height: 1.6;
      }

      .form {
        display: grid;
        gap: 14px;
      }

      label {
        color: var(--muted);
        display: grid;
        gap: 7px;
        font-size: 0.92rem;
      }

      input,
      select,
      textarea {
        background: rgb(5 9 13 / 78%);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        min-height: 40px;
        padding: 10px 11px;
        width: 100%;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: rgb(77 245 212 / 64%);
        box-shadow: var(--glow);
        outline: none;
      }

      textarea {
        min-height: 82px;
        resize: vertical;
      }

      .btn {
        align-items: center;
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        border-radius: 6px;
        color: #04100e;
        cursor: pointer;
        display: inline-flex;
        font-weight: 800;
        justify-content: center;
        min-height: 42px;
        padding: 10px 14px;
        transition:
          transform 140ms ease,
          box-shadow 140ms ease;
      }

      .btn:hover {
        box-shadow: var(--glow);
        transform: translateY(-1px);
      }

      .btn.secondary {
        background: rgb(255 255 255 / 4%);
        border: 1px solid var(--line);
        color: var(--primary);
      }

      .btn.danger {
        background: var(--danger);
        color: #1f070b;
      }

      .sample-users {
        display: grid;
        gap: 8px;
        margin-top: 18px;
      }

      .sample-users button {
        background:
          linear-gradient(135deg, rgb(77 245 212 / 9%), transparent),
          var(--surface-soft);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        cursor: pointer;
        padding: 10px;
        text-align: left;
        transition:
          border-color 140ms ease,
          transform 140ms ease;
      }

      .sample-users button:hover {
        border-color: rgb(77 245 212 / 54%);
        transform: translateX(2px);
      }

      .shell {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        min-height: 100vh;
      }

      .mobile-topbar {
        display: none;
      }

      .sidebar {
        backdrop-filter: blur(20px);
        background: linear-gradient(180deg, rgb(10 16 23 / 88%), rgb(8 12 18 / 72%));
        border-right: 1px solid var(--line);
        padding: 24px;
        position: sticky;
        top: 0;
        height: 100vh;
      }

      .brand {
        align-items: center;
        display: flex;
        gap: 12px;
        margin-bottom: 24px;
      }

      .logo-slot {
        align-items: center;
        background: transparent;
        border: 1px solid rgb(255 255 255 / 10%);
        border-radius: 8px;
        display: inline-flex;
        flex: 0 0 auto;
        height: 46px;
        justify-content: center;
        overflow: hidden;
        padding: 0;
        width: 46px;
      }

      .logo-slot img {
        display: block;
        height: 86%;
        object-fit: contain;
        width: 86%;
      }

      .brand strong {
        display: block;
        font-size: 1.35rem;
        letter-spacing: 0;
      }

      .brand span {
        display: block;
      }

      .deploy-meta {
        border-left: 1px solid rgb(255 255 255 / 12%);
        color: var(--muted);
        display: grid;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 0.68rem;
        gap: 3px;
        line-height: 1.35;
        margin-top: 10px;
        padding-left: 10px;
      }

      .deploy-meta b {
        color: var(--accent);
        font-weight: 800;
      }

      .nav {
        display: grid;
        gap: 8px;
      }

      .nav button {
        background: rgb(255 255 255 / 2%);
        border: 1px solid transparent;
        border-radius: 6px;
        color: var(--muted);
        cursor: pointer;
        padding: 10px 12px;
        text-align: left;
        transition:
          background 140ms ease,
          border-color 140ms ease,
          color 140ms ease;
      }

      .nav button.active {
        background: linear-gradient(135deg, rgb(77 245 212 / 16%), rgb(255 255 255 / 4%));
        border-color: rgb(77 245 212 / 28%);
        color: var(--primary);
        font-weight: 800;
      }

      .nav button:hover {
        border-color: var(--line);
        color: var(--text);
      }

      .user-box {
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.9rem;
        margin-top: 24px;
        padding-top: 18px;
      }

      .language-block {
        display: grid;
        gap: 7px;
        margin-bottom: 16px;
      }

      .language-select {
        background: rgb(255 255 255 / 4%);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        min-height: 38px;
        padding: 8px 10px;
        width: 100%;
      }

      .main {
        padding: 30px;
      }

      .sidebar-backdrop {
        display: none;
      }

      .topbar {
        align-items: flex-start;
        display: flex;
        gap: 16px;
        justify-content: space-between;
        margin-bottom: 22px;
      }

      .badge {
        background: linear-gradient(135deg, rgb(77 245 212 / 14%), rgb(244 201 107 / 8%));
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--primary);
        display: inline-flex;
        font-size: 0.82rem;
        font-weight: 800;
        padding: 7px 10px;
      }

      .grid {
        display: grid;
        gap: 16px;
      }

      .stats {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .stat {
        padding: 18px;
        overflow: hidden;
      }

      .stat span {
        color: var(--muted);
        display: block;
        margin-bottom: 8px;
      }

      .stat strong {
        color: var(--accent);
        font-size: 2rem;
        text-shadow: 0 0 28px rgb(244 201 107 / 34%);
      }

      .content-grid {
        grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
        margin-top: 16px;
      }

      .section {
        padding: 18px;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        border-collapse: collapse;
        min-width: 720px;
        width: 100%;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 12px 8px;
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-size: 0.82rem;
        text-transform: uppercase;
      }

      tr.clickable {
        cursor: pointer;
      }

      tr.clickable:hover {
        background: rgb(77 245 212 / 8%);
      }

      .selected-row {
        background: rgb(77 245 212 / 12%);
      }

      .pill {
        border-radius: 999px;
        display: inline-flex;
        font-size: 0.78rem;
        font-weight: 800;
        padding: 5px 8px;
      }

      .pill.ok {
        background: rgb(125 223 159 / 14%);
        color: var(--ok);
      }

      .pill.warn {
        background: rgb(244 201 107 / 16%);
        color: var(--accent);
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .timeline {
        display: grid;
        gap: 10px;
      }

      .timeline-item {
        border-left: 3px solid var(--primary);
        padding-left: 12px;
      }

      .two-cols {
        display: grid;
        gap: 12px;
        grid-template-columns: 1fr 1fr;
      }

      .photo-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .photo-card {
        background:
          linear-gradient(135deg, rgb(77 245 212 / 18%), rgb(244 201 107 / 16%)),
          rgb(255 255 255 / 3%);
        border: 1px solid var(--line);
        border-radius: 8px;
        min-height: 110px;
        padding: 12px;
      }

      .alert {
        background: rgb(244 201 107 / 12%);
        border: 1px solid rgb(244 201 107 / 24%);
        border-radius: 8px;
        color: #ffe7a6;
        padding: 12px;
      }

      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
      }

      .tab-button {
        background: rgb(255 255 255 / 3%);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--muted);
        cursor: pointer;
        font-weight: 800;
        min-height: 38px;
        padding: 9px 12px;
      }

      .tab-button.active {
        background: rgb(77 245 212 / 14%);
        border-color: rgb(77 245 212 / 42%);
        color: var(--primary);
      }

      .patient-detail {
        grid-column: 1 / -1;
      }

      .form-section {
        border-top: 1px solid var(--line);
        display: grid;
        gap: 14px;
        margin-top: 16px;
        padding-top: 16px;
      }

      .field-manager {
        border: 1px solid var(--line);
        border-radius: 8px;
        display: grid;
        gap: 14px;
        margin-bottom: 16px;
        padding: 14px;
      }

      .field-row {
        align-items: center;
        border-bottom: 1px solid var(--line);
        display: grid;
        gap: 10px;
        grid-template-columns: minmax(0, 1fr) auto auto;
        padding: 10px 0;
      }

      .field-row:last-child {
        border-bottom: 0;
      }

      .field-row-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .field-help {
        color: var(--muted);
        font-size: 0.78rem;
        line-height: 1.4;
      }

      .assistant-card {
        grid-column: 1 / -1;
      }

      .assistant-chat {
        display: grid;
        gap: 12px;
      }

      .assistant-messages {
        display: grid;
        gap: 10px;
        max-height: 260px;
        overflow-y: auto;
      }

      .assistant-message {
        border: 1px solid var(--line);
        border-radius: 8px;
        line-height: 1.5;
        max-width: 78%;
        padding: 10px 12px;
      }

      .assistant-message.assistant {
        background: rgb(77 245 212 / 10%);
        color: var(--text);
      }

      .assistant-message.user {
        background: rgb(244 201 107 / 13%);
        justify-self: end;
      }

      .assistant-form {
        display: grid;
        gap: 10px;
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .assistant-form input {
        background: rgb(255 255 255 / 4%);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        font: inherit;
        min-height: 44px;
        padding: 10px 12px;
      }

      .audio-actions {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .audio-status {
        color: var(--accent);
        font-weight: 800;
      }

      .architecture-shell {
        display: grid;
        gap: 16px;
      }

      .architecture-map {
        background:
          radial-gradient(circle at 12% 20%, rgb(77 245 212 / 18%), transparent 22rem),
          radial-gradient(circle at 85% 28%, rgb(244 201 107 / 13%), transparent 20rem),
          linear-gradient(135deg, rgb(255 255 255 / 7%), rgb(255 255 255 / 2%));
        border: 1px solid rgb(77 245 212 / 22%);
        border-radius: 8px;
        display: grid;
        gap: 18px;
        overflow: hidden;
        padding: 18px;
        position: relative;
      }

      .architecture-map::before {
        background:
          linear-gradient(90deg, rgb(77 245 212 / 10%) 1px, transparent 1px),
          linear-gradient(rgb(77 245 212 / 8%) 1px, transparent 1px);
        background-size: 42px 42px;
        content: "";
        inset: 0;
        opacity: 0.55;
        pointer-events: none;
        position: absolute;
      }

      .architecture-map > * {
        position: relative;
        z-index: 1;
      }

      .architecture-core {
        align-items: center;
        background:
          linear-gradient(135deg, rgb(77 245 212 / 22%), rgb(244 201 107 / 10%)),
          rgb(6 9 13 / 72%);
        border: 1px solid rgb(77 245 212 / 42%);
        border-radius: 8px;
        box-shadow: 0 0 42px rgb(77 245 212 / 22%);
        display: grid;
        gap: 8px;
        justify-items: center;
        margin: 0 auto;
        max-width: 520px;
        padding: 18px;
        text-align: center;
      }

      .architecture-core strong {
        color: var(--primary);
        font-size: 1.4rem;
      }

      .architecture-lanes {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .architecture-lane {
        background: rgb(6 9 13 / 64%);
        border: 1px solid var(--line);
        border-radius: 8px;
        display: grid;
        gap: 10px;
        padding: 14px;
      }

      .architecture-lane h2 {
        color: var(--primary);
        font-size: 0.98rem;
        margin: 0;
      }

      .architecture-node {
        background:
          linear-gradient(135deg, rgb(255 255 255 / 8%), rgb(255 255 255 / 3%)),
          rgb(12 18 25 / 88%);
        border: 1px solid rgb(77 245 212 / 18%);
        border-radius: 8px;
        padding: 12px;
      }

      .architecture-node strong {
        display: block;
        margin-bottom: 6px;
      }

      .architecture-node span {
        color: var(--muted);
        display: block;
        font-size: 0.82rem;
        line-height: 1.45;
      }

      .architecture-flow {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .flow-step {
        background: rgb(77 245 212 / 8%);
        border: 1px solid rgb(77 245 212 / 24%);
        border-radius: 8px;
        padding: 12px;
        position: relative;
      }

      .flow-step:not(:last-child)::after {
        color: var(--primary);
        content: ">";
        font-weight: 900;
        position: absolute;
        right: -11px;
        top: 50%;
        transform: translateY(-50%);
      }

      .architecture-principles {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .future-chart-card {
        grid-column: 1 / -1;
        overflow: hidden;
        position: relative;
      }

      .future-chart-card::before {
        animation: chartGlow 5s ease-in-out infinite;
        background:
          radial-gradient(circle at 18% 20%, rgb(77 245 212 / 24%), transparent 18rem),
          radial-gradient(circle at 82% 12%, rgb(244 201 107 / 18%), transparent 16rem);
        content: "";
        inset: -30%;
        position: absolute;
        z-index: 0;
      }

      .future-chart {
        display: grid;
        gap: 18px;
        position: relative;
        z-index: 1;
      }

      .chart-stage {
        align-items: end;
        background:
          linear-gradient(180deg, rgb(255 255 255 / 8%) 1px, transparent 1px),
          linear-gradient(90deg, rgb(255 255 255 / 6%) 1px, transparent 1px),
          rgb(6 9 13 / 38%);
        background-size: 100% 25%, 12.5% 100%;
        border: 1px solid rgb(77 245 212 / 22%);
        border-radius: 8px;
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(8, minmax(0, 1fr));
        min-height: 260px;
        padding: 18px;
      }

      .chart-column {
        align-items: end;
        display: grid;
        gap: 8px;
        min-width: 0;
      }

      .chart-bar {
        animation: riseBar 900ms cubic-bezier(.2,.8,.2,1) both;
        background: linear-gradient(180deg, var(--primary), rgb(77 245 212 / 16%));
        border: 1px solid rgb(77 245 212 / 54%);
        border-radius: 8px 8px 3px 3px;
        box-shadow: 0 0 22px rgb(77 245 212 / 34%);
        min-height: 18px;
      }

      .chart-bar.warn {
        background: linear-gradient(180deg, var(--accent), rgb(244 201 107 / 15%));
        border-color: rgb(244 201 107 / 60%);
        box-shadow: 0 0 22px rgb(244 201 107 / 32%);
      }

      .chart-label {
        color: var(--muted);
        font-size: 0.78rem;
        overflow: hidden;
        text-align: center;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .chart-kpis {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .chart-kpi {
        background: rgb(255 255 255 / 4%);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
      }

      .chart-kpi span {
        color: var(--muted);
        display: block;
        font-size: 0.82rem;
        margin-bottom: 6px;
      }

      .chart-kpi strong {
        color: var(--primary);
        font-size: 1.45rem;
      }

      @keyframes riseBar {
        from {
          opacity: 0;
          transform: scaleY(.08);
          transform-origin: bottom;
        }
        to {
          opacity: 1;
          transform: scaleY(1);
          transform-origin: bottom;
        }
      }

      @keyframes chartGlow {
        0%, 100% { transform: translate3d(0, 0, 0) rotate(0deg); }
        50% { transform: translate3d(4%, -2%, 0) rotate(5deg); }
      }

      .empty {
        border: 1px dashed var(--line);
        border-radius: 8px;
        color: var(--muted);
        padding: 18px;
        text-align: center;
      }

      @media (max-width: 980px) {
        .login-shell,
        .shell,
        .content-grid,
        .stats,
        .two-cols,
        .architecture-lanes,
        .architecture-flow,
        .architecture-principles,
        .chart-kpis {
          grid-template-columns: 1fr;
        }

        .shell {
          display: block;
          padding-top: 72px;
        }

        .mobile-topbar {
          align-items: center;
          backdrop-filter: blur(18px);
          background: rgb(6 9 13 / 82%);
          border-bottom: 1px solid var(--line);
          display: flex;
          gap: 12px;
          height: 72px;
          justify-content: space-between;
          left: 0;
          padding: 12px 16px;
          position: fixed;
          right: 0;
          top: 0;
          z-index: 40;
        }

        .mobile-brand {
          align-items: center;
          display: flex;
          gap: 10px;
          min-width: 0;
        }

        .mobile-brand strong {
          display: block;
          font-size: 1rem;
        }

        .mobile-brand span {
          color: var(--muted);
          display: block;
          font-size: 0.78rem;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .mobile-brand .deploy-meta {
          display: none;
        }

        .flow-step:not(:last-child)::after {
          bottom: -18px;
          right: 50%;
          top: auto;
          transform: translateX(50%) rotate(90deg);
        }

        .menu-toggle {
          align-items: center;
          background: linear-gradient(135deg, rgb(77 245 212 / 18%), rgb(255 255 255 / 5%));
          border: 1px solid var(--line);
          border-radius: 8px;
          color: var(--primary);
          cursor: pointer;
          display: inline-flex;
          flex-direction: column;
          gap: 5px;
          height: 44px;
          justify-content: center;
          width: 44px;
        }

      function translateText(value, language = readLanguage()) {
        const text = String(value ?? "").trim();
        if (!text || language === "pt") return value;
        return I18N[language]?.[text] ?? value;
      }

      function renderLanguageSelector() {
        const currentLanguage = readLanguage();
        return `

            <span>Idioma / Language</span>
            <select class="language-select" data-language-select>
              ${Object.entries(LANGUAGES).map(([code, label]) => `
                <option value="${code}" ${currentLanguage === code ? "selected" : ""}>${label}</option>
              `).join("")}
            </select>
          </label>
        `;
      }

      function applyTranslations(root = app) {
        const language = readLanguage();
        if (language === "pt") return;

        root.querySelectorAll("input[placeholder], textarea[placeholder]").forEach((field) => {
          field.placeholder = translateText(field.placeholder, language);
        });

        root.querySelectorAll("[aria-label], [title]").forEach((element) => {
          if (element.hasAttribute("aria-label")) {
            element.setAttribute("aria-label", translateText(element.getAttribute("aria-label"), language));
          }
          if (element.hasAttribute("title")) {
            element.setAttribute("title", translateText(element.getAttribute("title"), language));
          }
        });

        const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
          acceptNode(node) {
            const parent = node.parentElement;
            if (!parent || ["SCRIPT", "STYLE", "TEXTAREA", "OPTION"].includes(parent.tagName)) {
              return NodeFilter.FILTER_REJECT;
            }
            return node.nodeValue.trim() ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
          }
        });

        const nodes = [];
        while (walker.nextNode()) nodes.push(walker.currentNode);

        nodes.forEach((node) => {
          const original = node.nodeValue;
          const translated = translateText(original, language);
          if (translated !== original) {
            node.nodeValue = original.replace(original.trim(), translated);
          }
        });

        root.querySelectorAll("option").forEach((option) => {
          option.textContent = translateText(option.textContent, language);
        });
      }

      function bindLanguageSelectors() {
        document.querySelectorAll("[data-language-select]").forEach((select) => {
          select.addEventListener("change", () => {
            setLanguage(select.value);
            render();

        });
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function assistantReply(message) {
        const text = message.toLowerCase();
        if (text.includes("dor") || text.includes("inch") || text.includes("cans")) {
          return "Entendi. Vou registrar isso como um ponto de atenção. Se a dor estiver forte ou diferente do habitual, vale avisar sua profissional e evitar se automedicar.";

        if (text.includes("bem") || text.includes("melhor") || text.includes("otim")) {
          return "Que bom saber. Mantenha sua rotina de cuidado e me conte se houve algo que ajudou hoje, como movimento leve, hidratacao ou descanso.";
        }
        if (text.includes("triste") || text.includes("ans") || text.includes("mal")) {
          return "Sinto muito que hoje esteja pesado. Vamos por partes: respire, acolha o que você está sentindo e registre um sintoma simples para sua equipe acompanhar.";
        }
        return "Obrigado por me contar. Quer registrar também nível de dor, inchaço, energia ou alguma observação do dia?";
      }

              <h2>Novo paciente</h2>
              ${renderEssentialPatientForm("patient-form", {}, "Cadastrar paciente")}
            </article>
            ${patient ? renderPatientRecord(state, session, patient, activeTab) : ""}
          </section>
        `;
      }

      function renderPatientRecord(state, session, patient, activeTab) {
        return `
          <article class="card section patient-detail">
            <h2>Ficha do paciente</h2>
            <div class="tabs" role="tablist" aria-label="Abas da ficha do paciente">
              ${renderPatientTab("essential", "Dados Essenciais", activeTab)}
              ${renderPatientTab("custom", "Dados Personalizados", activeTab)}
              ${renderPatientTab("history", "Histórico", activeTab)}
            </div>
            ${activeTab === "custom"
              ? renderCustomPatientFields(state, session, patient)
              : activeTab === "history"
                ? renderClinicalRecord(patient)
                : renderEssentialPatientForm("patient-essential-form", patient, "Salvar dados essenciais")}
          </article>
        `;
      }

      function renderPatientTab(tab, label, activeTab) {
        return `<button class="tab-button ${activeTab === tab ? "active" : ""}" type="button" data-patient-tab="${tab}">${label}</button>`;
      }

      function renderEssentialPatientForm(formId, patient, actionLabel) {
        return `
          <form id="${formId}" class="form">
            <input name="patientId" type="hidden" value="${patient.id ?? ""}" />
            <label>Nome completo <input name="fullName" value="${patient.fullName ?? ""}" required /></label>
            <div class="two-cols">
              <label>CPF <input name="cpf" value="${patient.cpf ?? ""}" /></label>
              <label>RG <input name="rg" value="${patient.rg ?? ""}" /></label>
            </div>
            <div class="two-cols">
              <label>Data de nascimento <input name="birthDate" type="date" value="${patient.birthDate ?? ""}" /></label>
              <label>Sexo
                <select name="sex">
                  ${["", "Feminino", "Masculino", "Outro", "Nao informado"].map((option) => `
                    <option value="${option}" ${option === (patient.sex ?? "") ? "selected" : ""}>${option === "Nao informado" ? "Não informado" : option || "Selecione"}</option>
                  `).join("")}
                </select>
              </label>
            </div>
            <div class="two-cols">
              <label>Telefone <input name="phone" value="${patient.phone ?? ""}" /></label>
              <label>WhatsApp <input name="whatsapp" value="${patient.whatsapp ?? ""}" /></label>
            </div>
            <label>E-mail <input name="email" type="email" value="${patient.email ?? ""}" /></label>
            <label>Endereco completo <input name="address" value="${patient.address ?? ""}" /></label>
            <div class="two-cols">
              <label>Cidade <input name="city" value="${patient.city ?? ""}" /></label>
              <label>Estado <input name="stateUf" maxlength="2" value="${patient.stateUf ?? ""}" /></label>
            </div>
            <div class="two-cols">
              <label>CEP <input name="zipCode" value="${patient.zipCode ?? ""}" /></label>
              <label>Profissao <input name="profession" value="${patient.profession ?? ""}" /></label>
            </div>
            <div class="two-cols">
              <label>Convenio <input name="insurance" value="${patient.insurance ?? ""}" /></label>
              <label>Numero da carteirinha <input name="insuranceNumber" value="${patient.insuranceNumber ?? ""}" /></label>
            </div>
            <div class="two-cols">
              <label>Estado civil <input name="maritalStatus" value="${patient.maritalStatus ?? ""}" /></label>
              <label>Responsavel, se menor <input name="guardianName" value="${patient.guardianName ?? ""}" /></label>
            </div>
            <label>Observacoes gerais <textarea name="generalNotes">${patient.generalNotes ?? ""}</textarea></label>
            <button class="btn" type="submit">${actionLabel}</button>
          </form>
        `;
      }

      function doctorIdForSession(session) {
        return session.role === "PROFESSIONAL" ? session.id : "u-pro";
      }

      function tenantIdForSession(session) {
        return session.tenantId ?? "tenant-lipecare";
      }

      function customTemplatesForDoctor(state, tenantId, doctorId, includeInactive = false) {
        return (state.customFieldTemplates ?? [])
          .filter((field) =>
            (field.tenantId ?? "tenant-lipecare") === tenantId &&
            field.doctorId === doctorId &&
            (includeInactive || field.active)
          )
          .sort((a, b) => Number(a.displayOrder) - Number(b.displayOrder));
      }

      function customValueForField(state, tenantId, patientId, doctorId, fieldId) {
        return (state.customFieldValues ?? []).find((value) =>
          (value.tenantId ?? "tenant-lipecare") === tenantId &&
          value.patientId === patientId &&
          value.doctorId === doctorId &&
          value.customFieldId === fieldId
        )?.value ?? "";
      }

      function renderCustomPatientFields(state, session, patient) {
        const tenantId = tenantIdForSession(session);
        const doctorId = doctorIdForSession(session);
        const fields = customTemplatesForDoctor(state, tenantId, doctorId);
        const allFields = customTemplatesForDoctor(state, tenantId, doctorId, true);

        return `
          <div class="stack">
            <div class="alert">
              Campos personalizados são templates livres deste médico neste tenant. Eles aparecem em todos os pacientes atuais e futuros deste médico, sem afetar outros médicos.
            </div>
            ${session.role !== "PATIENT" ? renderCustomFieldManager(allFields, session) : ""}
            <form id="patient-custom-form" class="form">
              <input name="patientId" type="hidden" value="${patient.id}" />
              ${fields.length ? fields.map((field) => renderCustomFieldInput(field, customValueForField(state, tenantId, patient.id, doctorId, field.id))).join("") : empty("Nenhum template ativo para este médico. Crie qualquer campo em Gerenciar Campos Personalizados.")}
              ${fields.length ? `<button class="btn" type="submit">Salvar dados personalizados</button>` : ""}
            </form>
          </div>
        `;
      }

      function renderCustomFieldInput(field, value) {
        const required = field.required ? "required" : "";
        const help = field.helpText ? `<span class="field-help">${field.helpText}</span>` : "";
        const options = Array.isArray(field.options) ? field.options : [];

        if (field.fieldType === "long_text") {
          return `<label>${field.label}${help}<textarea name="custom_${field.id}" placeholder="${field.placeholder ?? ""}" ${required}>${value}</textarea></label>`;
        }

        if (field.fieldType === "number") {
          return `<label>${field.label}${help}<input name="custom_${field.id}" type="number" value="${value}" placeholder="${field.placeholder ?? ""}" ${required} /></label>`;
        }

        if (field.fieldType === "date") {
          return `<label>${field.label}${help}<input name="custom_${field.id}" type="date" value="${value}" ${required} /></label>`;
        }

        if (field.fieldType === "yes_no") {
          return `
            <label>${field.label}${help}
              <select name="custom_${field.id}" ${required}>
                ${["", "Sim", "Nao"].map((option) => `<option value="${option}" ${option === value ? "selected" : ""}>${option === "Nao" ? "Não" : option || "Selecione"}</option>`).join("")}
              </select>
            </label>
          `;
        }

        if (field.fieldType === "select" || field.fieldType === "multi_select") {
          return `
            <label>${field.label}${help}
              <select name="custom_${field.id}" ${field.fieldType === "multi_select" ? "multiple" : ""} ${required}>
                ${field.fieldType === "select" ? `<option value="">${field.placeholder || "Selecione"}</option>` : ""}
                ${options.map((option) => `<option value="${option}" ${String(value).split(", ").includes(option) ? "selected" : ""}>${option}</option>`).join("")}
              </select>
            </label>
          `;
        }

        if (field.fieldType === "checkbox") {
          return `<label><input name="custom_${field.id}" type="checkbox" value="Sim" ${value === "Sim" ? "checked" : ""} /> ${field.label}${help}</label>`;
        }

        if (field.fieldType === "upload_file") {
          return `<label>${field.label}${help}${value ? `<span class="field-help">Arquivo atual: ${value}</span>` : ""}<input name="custom_${field.id}" type="file" ${required} /></label>`;
        }

        const type = {
          email: "email",
          phone: "tel"
        }[field.fieldType] ?? "text";

        return `<label>${field.label}${help}<input name="custom_${field.id}" type="${type}" value="${value}" placeholder="${field.placeholder ?? ""}" ${required} /></label>`;
      }

      function renderCustomFieldManager(fields, session) {
        return `
          <div class="field-manager">
            <div>
              <h2>Gerenciar Templates De Campos</h2>
              <p class="muted">Crie qualquer campo adicional para ${session.role === "ADMIN" ? "o médico selecionado" : "sua ficha de pacientes"}. O template fica salvo para pacientes atuais e futuros deste médico dentro do tenant atual.</p>
            </div>
            ${fields.length ? fields.map((field) => `
              <div class="field-row">
                <div>
                  <strong>${field.displayOrder}. ${field.label}</strong>
                  <div class="field-help">${field.fieldType} ${field.required ? "- obrigatório" : ""} ${field.active ? "" : "- inativo"}</div>
                </div>
                <span class="pill ${field.active ? "ok" : "warn"}">${field.active ? "Ativo" : "Oculto"}</span>
                <div class="field-row-actions">
                  <button class="btn secondary" type="button" data-toggle-custom-field="${field.id}">${field.active ? "Desativar" : "Ativar"}</button>
                </div>
              </div>
            `).join("") : empty("Nenhum campo criado para este médico.")}
            <form id="custom-field-form" class="form">
              <div class="two-cols">
                <label>Nome do novo campo <input name="label" placeholder="Ex.: Objetivo do tratamento, Queixa principal, Código interno" required /></label>
                <label>Tipo de campo
                  <select name="fieldType" required>
                    <option value="short_text">Texto curto</option>
                    <option value="long_text">Texto longo</option>
                    <option value="number">Número</option>
                    <option value="date">Data</option>
                    <option value="yes_no">Sim / Não</option>
                    <option value="select">Lista suspensa</option>
                    <option value="multi_select">Múltipla escolha</option>
                    <option value="checkbox">Checkbox</option>
                    <option value="upload_file">Upload de arquivo</option>
                    <option value="phone">Telefone</option>
                    <option value="email">E-mail</option>
                  </select>
                </label>
              </div>
              <div class="two-cols">
                <label>Ordem <input name="displayOrder" type="number" min="1" value="${fields.length + 1}" required /></label>
                <label>Placeholder <input name="placeholder" placeholder="Texto de apoio no campo" /></label>
              </div>
              <label>Texto de ajuda <input name="helpText" placeholder="Orientação curta para preenchimento" /></label>
              <label>Opções, separadas por vírgula <input name="options" placeholder="Opção 1, Opção 2, Opção 3" /></label>
              <label><input name="required" type="checkbox" value="true" /> Campo obrigatório</label>
              <button class="btn" type="submit">Criar campo personalizado</button>
            </form>
          </div>
        `;
      }

      function renderClinicalRecord(patient) {
        return `
          <article class="card section assistant-card">
            <h2>Histórico do paciente</h2>
            <div class="stack">
              <div class="alert"><strong>Resumo clínico:</strong> ${patient.clinicalSummary}</div>
              <div class="timeline">
                ${(patient.clinicalHistory ?? []).map((item) => `
                  <div class="timeline-item">${item}</div>
                `).join("")}
                ${(patient.audioNotes ?? []).map((note) => `
                  <div class="timeline-item">
                    <strong>Nota por áudio</strong>
                    <p class="muted">${note.date}</p>
                    <p>${note.text}</p>
                  </div>
                `).join("")}
              </div>
              <form id="audio-note-form" class="form">
                <label>Resumo ou transcrição da nota
                  <textarea name="note" id="audio-note-text" rows="3" placeholder="Grave ou digite a evolução do atendimento..."></textarea>
                </label>
                <div class="audio-actions">
                  <button class="btn secondary" id="audio-record-btn" type="button">Gravar áudio</button>
                  <span class="audio-status" id="audio-status">Pronto para gravar</span>
                </div>
                <button class="btn" type="submit">Salvar no histórico</button>
              </form>
            </div>
          </article>
        `;
      }

      function renderPatientTable(patients, selectedId) {
        return `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Paciente</th>
                  <th>Idade</th>
                  <th>Status</th>
                  <th>Último check-in</th>
                </tr>
              </thead>
              <tbody>
                ${patients.map((patient) => `
                  <tr class="clickable ${patient.id === selectedId ? "selected-row" : ""}" data-select-patient="${patient.id}">
                    <td><strong>${patient.fullName}</strong><br /><span class="muted">${patient.phone || "Sem telefone"}</span></td>
                    <td>${patient.age}</td>
                    <td><span class="pill ${patient.status.includes("pendente") ? "warn" : "ok"}">${patient.status}</span></td>
                    <td>${patient.lastCheckin}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `;
      }

      function renderSymptoms(state, session) {
        const patient = selectedPatient(state, session);
        const symptoms = patient ? state.symptoms.filter((item) => item.patientId === patient.id) : [];

        return `
          ${renderHeader("Sintomas", "Registro de dor e observações clínicas.", patient ? patient.fullName : "Sem paciente")}
          ${patient ? `
            <section class="grid content-grid">
              <article class="card section">
                <h2>Histórico de sintomas</h2>
                ${symptoms.length ? `
                  <div class="timeline">
                    ${symptoms.map((item) => `
                      <div class="timeline-item">
                        <strong>${item.date} - Dor ${item.painLevel}/10</strong>
                        <p class="muted">${item.notes}</p>
                      </div>
                    `).join("")}
                  </div>
                ` : empty("Nenhum sintoma registrado.")}
              </article>
              <article class="card section">
                <h2>Novo registro</h2>
                <form id="symptom-form" class="form">
                  <label>Paciente ${renderPatientSelect(state, session)}</label>
                  <label>Data <input name="date" type="date" value="${today()}" required /></label>
                  <label>Nivel de dor <input name="painLevel" type="number" min="0" max="10" value="5" required /></label>
                  <label>Observacoes <textarea name="notes" required></textarea></label>
                  <button class="btn" type="submit">Salvar sintoma</button>
                </form>
              </article>
            </section>
          ` : empty("Nenhum paciente disponivel.")}
        `;
      }

      function renderMeasurements(state, session) {
        const patient = selectedPatient(state, session);
        const measurements = patient ? state.measurements.filter((item) => item.patientId === patient.id) : [];

        return `
          ${renderHeader("Medidas", "Acompanhamento de peso e medidas corporais.", patient ? patient.fullName : "Sem paciente")}
          ${patient ? `
            <section class="grid content-grid">
              <article class="card section">
                <h2>Histórico de medidas</h2>
                ${measurements.length ? `
                  <div class="table-wrap">
                    <table>
                      <thead>
                        <tr><th>Data</th><th>Peso</th><th>Cintura</th><th>Quadril</th></tr>
                      </thead>
                      <tbody>
                        ${measurements.map((item) => `
                          <tr>
                            <td>${item.date}</td>
                            <td>${item.weightKg} kg</td>
                            <td>${item.waistCm} cm</td>
                            <td>${item.hipCm} cm</td>
                          </tr>
                        `).join("")}
                      </tbody>
                    </table>
                  </div>
                ` : empty("Nenhuma medida registrada.")}
              </article>
              <article class="card section">
                <h2>Nova medida</h2>
                <form id="measurement-form" class="form">
                  <label>Paciente ${renderPatientSelect(state, session)}</label>
                  <label>Data <input name="date" type="date" value="${today()}" required /></label>
                  <div class="two-cols">
                    <label>Peso kg <input name="weightKg" type="number" step="0.1" required /></label>
                    <label>Cintura cm <input name="waistCm" type="number" step="0.1" required /></label>
                  </div>
                  <label>Quadril cm <input name="hipCm" type="number" step="0.1" required /></label>
                  <button class="btn" type="submit">Salvar medida</button>
                </form>
              </article>
            </section>
          ` : empty("Nenhum paciente disponivel.")}
        `;
      }

      function renderPhotos(state, session) {
        const patient = selectedPatient(state, session);
        const photos = patient ? state.photos.filter((item) => item.patientId === patient.id) : [];

        return `
          ${renderHeader("Fotos evolutivas", "Preview de storage privado com registros simulados.", patient ? patient.fullName : "Sem paciente")}
          <section class="grid content-grid">
            <article class="card section">
              <h2>Galeria privada simulada</h2>
              ${photos.length ? `
                <div class="photo-grid">
                  ${photos.map((photo) => `
                    <div class="photo-card">
                      <strong>${photo.label}</strong>
                      <p class="muted">${photo.date}</p>
                      <span class="pill ok">URL assinada futura</span>
                    </div>
                  `).join("")}
                </div>
              ` : empty("Nenhuma foto registrada.")}
            </article>
            <article class="card section">
              <h2>Novo registro simulado</h2>
              <form id="photo-form" class="form">
                <label>Paciente ${renderPatientSelect(state, session)}</label>
                <label>Data <input name="date" type="date" value="${today()}" required /></label>
                <label>Descricao <input name="label" value="Registro evolutivo" required /></label>
                <div class="alert">No sistema real, arquivos vao para storage privado S3 com URL assinada.</div>
                <button class="btn" type="submit">Salvar registro</button>
              </form>
            </article>
          </section>
        `;
      }

      function renderAdminManagement(state) {
        return `
          ${renderHeader("Gestão administrativa", "Clínicas, médicos e instituições vinculadas ao LipeCare.", "Administrador")}
          <section class="grid content-grid">
            <article class="card section">
              <h2>Clínicas</h2>
              <div class="table-wrap">
                <table>
                  <thead><tr><th>Clínica</th><th>Cidade</th><th>Status</th></tr></thead>
                  <tbody>
                    ${state.clinics.map((clinic) => `
                      <tr><td>${clinic.name}</td><td>${clinic.city}</td><td>${clinic.status}</td></tr>
                    `).join("")}
                  </tbody>
                </table>
              </div>
            </article>
            <article class="card section">
              <h2>Médicos</h2>
              <div class="table-wrap">
                <table>
                  <thead><tr><th>Médico</th><th>Especialidade</th><th>Clínica</th></tr></thead>
                  <tbody>
                    ${state.doctors.map((doctor) => `
                      <tr><td>${doctor.name}</td><td>${doctor.specialty}</td><td>${doctor.clinic}</td></tr>
                    `).join("")}
                  </tbody>
                </table>
              </div>
            </article>
            <article class="card section assistant-card">
              <h2>Instituições</h2>
              <div class="table-wrap">
                <table>
                  <thead><tr><th>Instituição</th><th>Tipo</th><th>Cidade</th></tr></thead>
                  <tbody>
                    ${state.institutions.map((institution) => `
                      <tr><td>${institution.name}</td><td>${institution.type}</td><td>${institution.city}</td></tr>
                    `).join("")}
                  </tbody>
                </table>
              </div>
            </article>
          </section>
        `;
      }

      function renderSystemArchitecture(state, session) {
        const tenantId = tenantIdForSession(session);
        const doctorId = doctorIdForSession(session);
        const patients = scopedPatients(state, session);
        const activeTemplates = customTemplatesForDoctor(state, tenantId, doctorId);
        const totalCustomValues = (state.customFieldValues ?? []).filter((value) =>
          (value.tenantId ?? "tenant-lipecare") === tenantId &&
          value.doctorId === doctorId
        ).length;

        return `
          ${renderHeader("Arquitetura do sistema", "Mapa mental operacional dos módulos, dados e conexões do CRM médico.", "Macro visão")}
          <section class="architecture-shell">
            <article class="architecture-map">
              <div class="architecture-core">
                <span class="badge">Tenant ${tenantId}</span>
                <strong>LipeCare CRM Médico</strong>
                <span class="muted">Camada central multi-tenant: pacientes, médicos, clínicas, templates, auditoria e operação clínica.</span>
              </div>

              <div class="architecture-flow" aria-label="Fluxo principal do sistema">
                ${renderFlowStep("1", "Login e perfil", "Define tenant, papel e escopo de permissão.")}
                ${renderFlowStep("2", "Dashboard", "Resume pacientes, alertas, check-ins e sinais clínicos.")}
                ${renderFlowStep("3", "Cadastro de pacientes", "Dados essenciais universais + vínculo médico/tenant.")}
                ${renderFlowStep("4", "Templates do médico", "Campos livres que viram padrão para pacientes atuais e futuros.")}
                ${renderFlowStep("5", "Auditoria e deploy", "Rastreia eventos, versão, deploy e commit publicados.")}
              </div>

              <div class="architecture-lanes">
                <div class="architecture-lane">
                  <h2>Identidade e acesso</h2>
                  ${renderArchitectureNode("Sessões", "Admin, médico e paciente com visões diferentes.")}
                  ${renderArchitectureNode("Multi-tenant", "Todos os pacientes e templates filtrados por tenantId.")}
                  ${renderArchitectureNode("Permissões", "Médico vê seus pacientes/templates; admin vê o tenant.")}
                </div>
                <div class="architecture-lane">
                  <h2>Cadastro clínico</h2>
                  ${renderArchitectureNode("Dados essenciais", "CPF, RG, nascimento, contato, endereço, convênio e observações.")}
                  ${renderArchitectureNode("Dados personalizados", `${activeTemplates.length} template(s) ativo(s) para este médico.`)}
                  ${renderArchitectureNode("Valores por paciente", `${totalCustomValues} valor(es) customizados salvos no escopo atual.`)}
                </div>
                <div class="architecture-lane">
                  <h2>Operação assistencial</h2>
                  ${renderArchitectureNode("Sintomas", "Dor, observações e histórico de sintomas.")}
                  ${renderArchitectureNode("Medidas", "Peso, cintura, quadril e evolução corporal.")}
                  ${renderArchitectureNode("Fotos", "Registro evolutivo preparado para storage privado.")}
                </div>
                <div class="architecture-lane">
                  <h2>Governança e deploy</h2>
                  ${renderArchitectureNode("Alertas", "Exames, retornos e pendências por paciente.")}
                  ${renderArchitectureNode("Auditoria", "Eventos de consulta, criação e alteração de dados sensíveis.")}
                  ${renderArchitectureNode("CapRover/GitHub", `v${BUILD_INFO.version}, deploy #${BUILD_INFO.deployNumber}, commit ${shortCommit(BUILD_INFO.commit)}.`)}
                </div>
              </div>

              <div class="architecture-principles">
                ${renderArchitectureNode("Regra de ouro", "Todo novo módulo deve entrar neste mapa macro.")}
                ${renderArchitectureNode("Escalabilidade", "Templates personalizados ficam separados dos dados essenciais.")}
                ${renderArchitectureNode("LGPD", "Dados sensíveis exigem tenantId, permissão e auditoria.")}
              </div>
            </article>
          </section>
        `;
      }

      function renderFlowStep(number, title, detail) {
        return `
          <div class="flow-step">
            <span class="pill ok">${number}</span>
            <strong>${title}</strong>
            <p class="muted">${detail}</p>
          </div>
        `;
      }

      function renderArchitectureNode(title, detail) {
        return `
          <div class="architecture-node">
            <strong>${title}</strong>
            <span>${detail}</span>
          </div>
        `;
      }

      function renderAlerts(state, session) {
        const patients = scopedPatients(state, session);
        const patientIds = patients.map((patient) => patient.id);
        const examAlerts = state.examAlerts.filter((alert) => patientIds.includes(alert.patientId));
        const returnAlerts = state.returnAlerts.filter((alert) => patientIds.includes(alert.patientId));

        return `
          ${renderHeader("Alertas", "Exames, pendências e retornos clínicos.", roleLabel(session.role))}
          <section class="grid stats">
            ${statCard("Exames em aberto", examAlerts.filter((alert) => alert.status !== "Resolvido").length)}
            ${statCard("Retornos pendentes", returnAlerts.filter((alert) => alert.status !== "Resolvido").length)}
            ${statCard("Alta prioridade", [...examAlerts, ...returnAlerts].filter((alert) => alert.priority === "Alta").length)}
            ${statCard("Pacientes monitorados", patients.length)}
          </section>
          <section class="grid content-grid">
            <article class="card section">
              <h2>Alertas de exames</h2>
              ${renderAlertList(examAlerts, state)}
              <form id="exam-alert-form" class="form">
                <h2>Novo alerta de exame</h2>
                <label>Paciente ${renderPatientSelect(state, session)}</label>
                <label>Titulo <input name="title" value="Solicitar exame de retorno" required /></label>
                <label>Data limite <input name="dueDate" type="date" value="${today()}" required /></label>
                <label>Detalhe <textarea name="detail" required></textarea></label>
                <button class="btn" type="submit">Criar alerta</button>
              </form>
            </article>
            <article class="card section">
              <h2>Retornos</h2>
              ${renderAlertList(returnAlerts, state)}
              <form id="return-alert-form" class="form">
                <h2>Agendar retorno</h2>
                <label>Paciente ${renderPatientSelect(state, session)}</label>
                <label>Motivo <input name="title" value="Retorno de acompanhamento" required /></label>
                <label>Data <input name="dueDate" type="date" value="${today()}" required /></label>
                <label>Resumo <textarea name="detail" required></textarea></label>
                <button class="btn" type="submit">Agendar retorno</button>
              </form>
            </article>
          </section>
        `;
      }

      function renderAlertList(alerts, state) {
        if (!alerts.length) return empty("Nenhum alerta encontrado.");

        return `
          <div class="timeline">
            ${alerts.map((alert) => {
              const patient = state.patients.find((item) => item.id === alert.patientId);
              return `
                <div class="timeline-item">
                  <strong>${alert.title}</strong>
                  <p class="muted">${patient?.fullName ?? "Paciente"} - ${alert.dueDate}</p>
                  <p>${alert.detail}</p>
                  <span class="pill ${alert.priority === "Alta" ? "warn" : "ok"}">${alert.priority}</span>
                  <span class="pill ${alert.status === "Resolvido" ? "ok" : "warn"}">${alert.status}</span>
                  ${alert.status !== "Resolvido" ? `<button class="btn secondary" type="button" data-resolve-alert="${alert.id}">Resolver</button>` : ""}
                </div>
              `;
            }).join("")}
          </div>
        `;
      }

      function renderAudit(state) {
        return `
          ${renderHeader("Auditoria", "Eventos mínimos para rastreabilidade de dados sensíveis.", "LGPD")}
          <section class="card section">
            <h2>Eventos recentes</h2>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr><th>Data</th><th>Acao</th><th>Ator</th><th>Recurso</th></tr>
                </thead>
                <tbody>
                  ${state.auditLogs.map((log) => `
                    <tr>
                      <td>${log.date}</td>
                      <td>${log.action}</td>
                      <td>${log.actor}</td>
                      <td>${log.resource}</td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          </section>
        `;
      }

      function renderPatientSelect(state, session) {
        const patients = scopedPatients(state, session);
        return `
          <select name="patientId" required>
            ${patients.map((patient) => `
              <option value="${patient.id}" ${patient.id === state.selectedPatientId ? "selected" : ""}>${patient.fullName}</option>
            `).join("")}
          </select>
        `;
      }

      function empty(message) {
        return `<div class="empty">${message}</div>`;
      }

      function slugify(value) {
        return String(value)
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "_")
          .replace(/^_+|_+$/g, "");
      }

      function ageFromBirthDate(value) {
        if (!value) return 0;
        const birthDate = new Date(value);
        const now = new Date();
        let age = now.getFullYear() - birthDate.getFullYear();
        const monthDiff = now.getMonth() - birthDate.getMonth();
        if (monthDiff < 0 || (monthDiff === 0 && now.getDate() < birthDate.getDate())) age -= 1;
        return Number.isFinite(age) ? age : 0;
      }

      function patientPayloadFromForm(data) {
        return {
          fullName: String(data.get("fullName")),
          cpf: String(data.get("cpf")),
          rg: String(data.get("rg")),
          birthDate: String(data.get("birthDate")),
          sex: String(data.get("sex")),
          phone: String(data.get("phone")),
          whatsapp: String(data.get("whatsapp")),
          email: String(data.get("email")),
          address: String(data.get("address")),
          city: String(data.get("city")),
          stateUf: String(data.get("stateUf")).toUpperCase(),
          zipCode: String(data.get("zipCode")),
          insurance: String(data.get("insurance")),
          insuranceNumber: String(data.get("insuranceNumber")),
          profession: String(data.get("profession")),
          maritalStatus: String(data.get("maritalStatus")),
          guardianName: String(data.get("guardianName")),
          generalNotes: String(data.get("generalNotes"))
        };
      }

      function bindViewEvents(session) {
        document.querySelectorAll("[data-select-patient]").forEach((row) => {
          row.addEventListener("click", () => {
            const state = readState();
            state.selectedPatientId = row.dataset.selectPatient;
            state.patientFormTab = "essential";
            state.auditLogs.unshift({
              id: crypto.randomUUID(),
              action: "patient_record_viewed",
              actor: session.name,
              resource: state.patients.find((patient) => patient.id === row.dataset.selectPatient)?.fullName ?? "Paciente",
              date: new Date().toLocaleString("pt-BR")
            });
            writeState(state);
            render();
          });
        });

        document.querySelectorAll("[data-patient-tab]").forEach((button) => {
          button.addEventListener("click", () => {
            const state = readState();
            state.patientFormTab = button.dataset.patientTab;
            writeState(state);
            render();
          });
        });

        const patientForm = document.getElementById("patient-form");
        if (patientForm) {
          patientForm.addEventListener("submit", (event) => {
            event.preventDefault();
            const data = new FormData(event.currentTarget);
            const state = readState();
            const patient = {
              id: crypto.randomUUID(),
              tenantId: tenantIdForSession(session),
              ...patientPayloadFromForm(data),
              age: ageFromBirthDate(String(data.get("birthDate"))),
              doctorId: doctorIdForSession(session),
              professional: session.role === "PROFESSIONAL" ? session.name : "Dra. Raquel Peres",
              status: "Avaliação pendente",
              lastCheckin: today(),
              clinicalSummary: "Paciente novo aguardando primeira avaliação clínica.",
              clinicalHistory: ["Cadastro criado para inicio do acompanhamento."],
              audioNotes: []
            };
            state.patients.unshift(patient);
            state.selectedPatientId = patient.id;
            state.patientFormTab = "custom";
            state.auditLogs.unshift({
              id: crypto.randomUUID(),
              action: "patient_created",
              actor: session.name,
              resource: patient.fullName,
              date: new Date().toLocaleString("pt-BR")
            });
            writeState(state);
            render();
          });
        }

        const patientEssentialForm = document.getElementById("patient-essential-form");
        if (patientEssentialForm) {
          patientEssentialForm.addEventListener("submit", (event) => {
            event.preventDefault();
            const data = new FormData(event.currentTarget);
            const state = readState();
            const patient = state.patients.find((item) => item.id === String(data.get("patientId")));
            if (!patient) return;

            Object.assign(patient, patientPayloadFromForm(data), {
              age: ageFromBirthDate(String(data.get("birthDate"))) || patient.age,
              updatedAt: new Date().toISOString()
            });
            state.auditLogs.unshift({
              id: crypto.randomUUID(),
              action: "patient_essential_updated",
              actor: session.name,
              resource: patient.fullName,
              date: new Date().toLocaleString("pt-BR")
            });
            writeState(state);
            render();
          });
        }

        const customFieldForm = document.getElementById("custom-field-form");
        if (customFieldForm) {
          customFieldForm.addEventListener("submit", (event) => {
            event.preventDefault();
            const data = new FormData(event.currentTarget);
            const label = String(data.get("label")).trim();
            if (!label) return;

            const state = readState();
            const tenantId = tenantIdForSession(session);
            const doctorId = doctorIdForSession(session);
            const field = {
              id: crypto.randomUUID(),
              tenantId,
              doctorId,
              label,
              fieldKey: slugify(label),
              fieldType: String(data.get("fieldType")),
              placeholder: String(data.get("placeholder")),
              helpText: String(data.get("helpText")),
              required: data.get("required") === "true",
              options: String(data.get("options")).split(",").map((item) => item.trim()).filter(Boolean),
              displayOrder: Number(data.get("displayOrder")) || customTemplatesForDoctor(state, tenantId, doctorId, true).length + 1,
              active: true,
              createdAt: new Date().toISOString()
            };
            state.customFieldTemplates = state.customFieldTemplates ?? [];
            state.customFieldTemplates.push(field);
            state.auditLogs.unshift({
              id: crypto.randomUUID(),
              action: "custom_patient_field_created",
              actor: session.name,
              resource: field.label,
              date: new Date().toLocaleString("pt-BR")
            });
            writeState(state);
            render();
          });
        }

        document.querySelectorAll("[data-toggle-custom-field]").forEach((button) => {
          button.addEventListener("click", () => {
            const state = readState();
            const field = state.customFieldTemplates.find((item) => item.id === button.dataset.toggleCustomField);
            if (!field) return;
            field.active = !field.active;
            field.updatedAt = new Date().toISOString();
            state.auditLogs.unshift({
              id: crypto.randomUUID(),
              action: field.active ? "custom_patient_field_activated" : "custom_patient_field_deactivated",
              actor: session.name,
              resource: field.label,
              date: new Date().toLocaleString("pt-BR")
            });
            writeState(state);
            render();
          });
        });

        const patientCustomForm = document.getElementById("patient-custom-form");
        if (patientCustomForm) {
          patientCustomForm.addEventListener("submit", (event) => {
            event.preventDefault();
            const data = new FormData(event.currentTarget);
            const state = readState();
            const patientId = String(data.get("patientId"));
            const patient = state.patients.find((item) => item.id === patientId);
            const tenantId = tenantIdForSession(session);
            const doctorId = doctorIdForSession(session);
            const fields = customTemplatesForDoctor(state, tenantId, doctorId);
            state.customFieldValues = state.customFieldValues ?? [];

            fields.forEach((field) => {
              const uploadedFile = data.get(`custom_${field.id}`);
              const previous = state.customFieldValues.find((value) =>
                (value.tenantId ?? "tenant-lipecare") === tenantId &&
                value.patientId === patientId &&
                value.doctorId === doctorId &&
                value.customFieldId === field.id
              );
              const raw = field.fieldType === "upload_file"
                ? (uploadedFile?.name || previous?.value || "")
                : field.fieldType === "multi_select"
                ? data.getAll(`custom_${field.id}`).join(", ")
                : field.fieldType === "checkbox"
                  ? (data.get(`custom_${field.id}`) ? "Sim" : "Nao")
                  : String(data.get(`custom_${field.id}`) ?? "");
              const existing = previous;
              if (existing) {
                existing.value = raw;
                existing.updatedAt = new Date().toISOString();
              } else {
                state.customFieldValues.push({
                  id: crypto.randomUUID(),
                  tenantId,
                  patientId,
                  doctorId,
                  customFieldId: field.id,
                  value: raw,
                  createdAt: new Date().toISOString()
                });
              }
            });
            state.auditLogs.unshift({
              id: crypto.randomUUID(),
              action: "patient_custom_fields_updated",
              actor: session.name,
              resource: patient?.fullName ?? "Paciente",
              date: new Date().toLocaleString("pt-BR")
            });
            writeState(state);
            render();
          });
        }

        const audioNoteForm = document.getElementById("audio-note-form");
        if (audioNoteForm) {
          audioNoteForm.addEventListener("submit", (event) => {
            event.preventDefault();
            const data = new FormData(event.currentTarget);
            const note = String(data.get("note")).trim();
            if (!note) return;

            const state = readState();
            const patient = state.patients.find((item) => item.id === state.selectedPatientId);
            if (!patient) return;

            patient.audioNotes = patient.audioNotes ?? [];
            patient.audioNotes.unshift({ text: note, date: new Date().toLocaleString("pt-BR") });
            patient.clinicalSummary = note.length > 130 ? `${note.slice(0, 130)}...` : note;
            state.auditLogs.unshift({
              id: crypto.randomUUID(),
              action: "clinical_audio_note_created",
              actor: session.name,
              resource: patient.fullName,
              date: new Date().toLocaleString("pt-BR")
            });
            writeState(state);
            render();
          });
        }

        const recordButton = document.getElementById("audio-record-btn");
        if (recordButton) {
          recordButton.addEventListener("click", () => {
            const status = document.getElementById("audio-status");
            const field = document.getElementById("audio-note-text");
            status.textContent = "Gravando simulação de áudio...";
            recordButton.textContent = "Parar gravação";
            window.setTimeout(() => {
              field.value = "Nota de áudio: paciente relata como se sentiu hoje, nível de dor, inchaço e orientações combinadas na consulta.";
              status.textContent = "Áudio transcrito automaticamente para revisão.";
              recordButton.textContent = "Gravar áudio";
            }, 1400);
          });
        }

        document.querySelectorAll("[data-resolve-alert]").forEach((button) => {
          button.addEventListener("click", () => {
            const state = readState();
            const alert = [...state.examAlerts, ...state.returnAlerts].find((item) => item.id === button.dataset.resolveAlert);
            if (!alert) return;

            alert.status = "Resolvido";
            state.auditLogs.unshift({
              id: crypto.randomUUID(),
              action: "clinical_alert_resolved",
              actor: session.name,
              resource: alert.title,
              date: new Date().toLocaleString("pt-BR")
            });
            writeState(state);
            render();
          });
        });

        bindAlertForm("exam-alert-form", "examAlerts", "exam_alert_created", session);
        bindAlertForm("return-alert-form", "returnAlerts", "return_alert_created", session);

        const assistantForm = document.getElementById("assistant-form");
        if (assistantForm) {
          assistantForm.addEventListener("submit", (event) => {
            event.preventDefault();
            const data = new FormData(event.currentTarget);
            const text = String(data.get("message")).trim();
            if (!text) return;

            const state = readState();
            state.assistantMessages.push({ role: "user", text, date: new Date().toLocaleString("pt-BR") });
            state.assistantMessages.push({
              role: "assistant",
              text: assistantReply(text),
              date: new Date().toLocaleString("pt-BR")
            });
            writeState(state);
            render();
          });
        }

        bindRecordForm("symptom-form", (state, data) => {
          const patient = state.patients.find((item) => item.id === String(data.get("patientId")));
          state.symptoms.unshift({
            id: crypto.randomUUID(),
            patientId: String(data.get("patientId")),
            date: String(data.get("date")),
            painLevel: Number(data.get("painLevel")),
            notes: String(data.get("notes"))
          });
          state.selectedPatientId = String(data.get("patientId"));
          return ["symptom_record_created", patient?.fullName ?? "Paciente"];
        }, session);

        bindRecordForm("measurement-form", (state, data) => {
          const patient = state.patients.find((item) => item.id === String(data.get("patientId")));
          state.measurements.unshift({
            id: crypto.randomUUID(),
            patientId: String(data.get("patientId")),
            date: String(data.get("date")),
            weightKg: Number(data.get("weightKg")),
            waistCm: Number(data.get("waistCm")),
            hipCm: Number(data.get("hipCm"))
          });
          state.selectedPatientId = String(data.get("patientId"));
          return ["measurement_record_created", patient?.fullName ?? "Paciente"];
        }, session);

        bindRecordForm("photo-form", (state, data) => {
          const patient = state.patients.find((item) => item.id === String(data.get("patientId")));
          state.photos.unshift({
            id: crypto.randomUUID(),
            patientId: String(data.get("patientId")),
            date: String(data.get("date")),
            label: String(data.get("label"))
          });
          state.selectedPatientId = String(data.get("patientId"));
          return ["photo_record_created", patient?.fullName ?? "Paciente"];
        }, session);
      }

      function bindRecordForm(formId, mutate, session) {
        const form = document.getElementById(formId);
        if (!form) return;

        form.addEventListener("submit", (event) => {
          event.preventDefault();
          const data = new FormData(event.currentTarget);
          const state = readState();
          const [action, resource] = mutate(state, data);
          state.auditLogs.unshift({
            id: crypto.randomUUID(),
            action,
            actor: session.name,
            resource,
            date: new Date().toLocaleString("pt-BR")
          });
          writeState(state);
          render();
        });
      }

      function bindAlertForm(formId, collectionName, action, session) {
        const form = document.getElementById(formId);
        if (!form) return;

        form.addEventListener("submit", (event) => {
          event.preventDefault();
          const data = new FormData(event.currentTarget);
          const state = readState();
          const patientId = String(data.get("patientId"));
          const patient = state.patients.find((item) => item.id === patientId);
          state[collectionName].unshift({
            id: crypto.randomUUID(),
            patientId,
            title: String(data.get("title")),
            dueDate: String(data.get("dueDate")),
            priority: "Media",
            status: collectionName === "returnAlerts" ? "Agendado" : "Aberto",
            detail: String(data.get("detail"))
          });
          state.selectedPatientId = patientId;
          state.auditLogs.unshift({
            id: crypto.randomUUID(),
            action,
            actor: session.name,
            resource: patient?.fullName ?? "Paciente",
            date: new Date().toLocaleString("pt-BR")
          });
          writeState(state);
          render();
        });
      }

      render();
    </script>
  </body>
</html>
