<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LipeCare MVP</title>
    <style>
      :root {
        --bg: #06090d;
        --surface: rgb(14 20 28 / 82%);
        --surface-strong: rgb(18 27 38 / 94%);
        --surface-soft: rgb(27 43 56 / 76%);
        --text: #eef7f6;
        --muted: #9db1b8;
        --line: rgb(167 243 208 / 14%);
        --primary: #4df5d4;
        --primary-dark: #16c8ae;
        --accent: #f4c96b;
        --danger: #fb7185;
        --ok: #7ddf9f;
        --glow: 0 0 44px rgb(77 245 212 / 24%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 12% 10%, rgb(77 245 212 / 15%), transparent 34rem),
          radial-gradient(circle at 85% 18%, rgb(244 201 107 / 11%), transparent 26rem),
          linear-gradient(135deg, #05070a 0%, #0a1118 48%, #07100f 100%);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
      }

      .app {
        background-image:
          linear-gradient(rgb(255 255 255 / 3%) 1px, transparent 1px),
          linear-gradient(90deg, rgb(255 255 255 / 3%) 1px, transparent 1px);
        background-size: 56px 56px;
        min-height: 100vh;
        position: relative;
      }

      .app::before {
        background: linear-gradient(180deg, rgb(255 255 255 / 7%), transparent);
        content: "";
        height: 1px;
        left: 0;
        position: fixed;
        right: 0;
        top: 0;
        z-index: 5;
      }

      .login-shell {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(340px, 0.9fr);
        min-height: 100vh;
      }

      .login-hero {
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 56px;
        position: relative;
      }

      .login-panel {
        align-items: center;
        backdrop-filter: blur(18px);
        background: linear-gradient(180deg, rgb(18 27 38 / 82%), rgb(9 14 20 / 70%));
        border-left: 1px solid var(--line);
        display: flex;
        padding: 32px;
      }

      .card {
        backdrop-filter: blur(18px);
        background:
          linear-gradient(145deg, rgb(255 255 255 / 8%), rgb(255 255 255 / 3%)),
          var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 24px 90px rgb(0 0 0 / 32%);
        position: relative;
      }

      .card::after {
        border-radius: inherit;
        box-shadow: inset 0 1px 0 rgb(255 255 255 / 10%);
        content: "";
        inset: 0;
        pointer-events: none;
        position: absolute;
      }

      .login-card {
        padding: 28px;
        width: 100%;
      }

      .eyebrow {
        color: var(--primary);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0;
        margin: 0 0 12px;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        font-size: clamp(2.4rem, 5vw, 5.2rem);
        letter-spacing: 0;
        line-height: 1;
        margin-bottom: 20px;
        text-wrap: balance;
      }

      .login-hero h1 {
        background: linear-gradient(92deg, #ffffff, #b8fff1 52%, #f4c96b);
        background-clip: text;
        color: transparent;
        max-width: 980px;
      }

      h2 {
        font-size: 1.35rem;
        margin-bottom: 12px;
      }

      h3 {
        font-size: 1rem;
        margin-bottom: 8px;
      }

      .muted {
        color: var(--muted);
        line-height: 1.6;
      }

      .form {
        display: grid;
        gap: 14px;
      }

      label {
        color: var(--muted);
        display: grid;
        gap: 7px;
        font-size: 0.92rem;
      }

      input,
      select,
      textarea {
        background: rgb(5 9 13 / 78%);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        min-height: 40px;
        padding: 10px 11px;
        width: 100%;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: rgb(77 245 212 / 64%);
        box-shadow: var(--glow);
        outline: none;
      }

      textarea {
        min-height: 82px;
        resize: vertical;
      }

      .btn {
        align-items: center;
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        border-radius: 6px;
        color: #04100e;
        cursor: pointer;
        display: inline-flex;
        font-weight: 800;
        justify-content: center;
        min-height: 42px;
        padding: 10px 14px;
        transition:
          transform 140ms ease,
          box-shadow 140ms ease;
      }

      .btn:hover {
        box-shadow: var(--glow);
        transform: translateY(-1px);
      }

      .btn.secondary {
        background: rgb(255 255 255 / 4%);
        border: 1px solid var(--line);
        color: var(--primary);
      }

      .btn.danger {
        background: var(--danger);
        color: #1f070b;
      }

      .sample-users {
        display: grid;
        gap: 8px;
        margin-top: 18px;
      }

      .sample-users button {
        background:
          linear-gradient(135deg, rgb(77 245 212 / 9%), transparent),
          var(--surface-soft);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        cursor: pointer;
        padding: 10px;
        text-align: left;
        transition:
          border-color 140ms ease,
          transform 140ms ease;
      }

      .sample-users button:hover {
        border-color: rgb(77 245 212 / 54%);
        transform: translateX(2px);
      }

      .shell {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        min-height: 100vh;
      }

      .mobile-topbar {
        display: none;
      }

      .sidebar {
        backdrop-filter: blur(20px);
        background: linear-gradient(180deg, rgb(10 16 23 / 88%), rgb(8 12 18 / 72%));
        border-right: 1px solid var(--line);
        padding: 24px;
        position: sticky;
        top: 0;
        height: 100vh;
      }

      .brand {
        align-items: center;
        display: flex;
        gap: 12px;
        margin-bottom: 24px;
      }

      .logo-slot {
        align-items: center;
        background: transparent;
        border: 1px solid rgb(255 255 255 / 10%);
        border-radius: 8px;
        display: inline-flex;
        flex: 0 0 auto;
        height: 46px;
        justify-content: center;
        overflow: hidden;
        padding: 0;
        width: 46px;
      }

      .logo-slot img {
        display: block;
        height: 86%;
        object-fit: contain;
        width: 86%;
      }

      .brand strong {
        display: block;
        font-size: 1.35rem;
        letter-spacing: 0;
      }

      .brand span {
        display: block;
      }

      .nav {
        display: grid;
        gap: 8px;
      }

      .nav button {
        background: rgb(255 255 255 / 2%);
        border: 1px solid transparent;
        border-radius: 6px;
        color: var(--muted);
        cursor: pointer;
        padding: 10px 12px;
        text-align: left;
        transition:
          background 140ms ease,
          border-color 140ms ease,
          color 140ms ease;
      }

      .nav button.active {
        background: linear-gradient(135deg, rgb(77 245 212 / 16%), rgb(255 255 255 / 4%));
        border-color: rgb(77 245 212 / 28%);
        color: var(--primary);
        font-weight: 800;
      }

      .nav button:hover {
        border-color: var(--line);
        color: var(--text);
      }

      .user-box {
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.9rem;
        margin-top: 24px;
        padding-top: 18px;
      }

      .main {
        padding: 30px;
      }

      .sidebar-backdrop {
        display: none;
      }

      .topbar {
        align-items: flex-start;
        display: flex;
        gap: 16px;
        justify-content: space-between;
        margin-bottom: 22px;
      }

      .badge {
        background: linear-gradient(135deg, rgb(77 245 212 / 14%), rgb(244 201 107 / 8%));
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--primary);
        display: inline-flex;
        font-size: 0.82rem;
        font-weight: 800;
        padding: 7px 10px;
      }

      .grid {
        display: grid;
        gap: 16px;
      }

      .stats {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .stat {
        padding: 18px;
        overflow: hidden;
      }

      .stat span {
        color: var(--muted);
        display: block;
        margin-bottom: 8px;
      }

      .stat strong {
        color: var(--accent);
        font-size: 2rem;
        text-shadow: 0 0 28px rgb(244 201 107 / 34%);
      }

      .content-grid {
        grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
        margin-top: 16px;
      }

      .section {
        padding: 18px;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        border-collapse: collapse;
        min-width: 720px;
        width: 100%;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 12px 8px;
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-size: 0.82rem;
        text-transform: uppercase;
      }

      tr.clickable {
        cursor: pointer;
      }

      tr.clickable:hover {
        background: rgb(77 245 212 / 8%);
      }

      .selected-row {
        background: rgb(77 245 212 / 12%);
      }

      .pill {
        border-radius: 999px;
        display: inline-flex;
        font-size: 0.78rem;
        font-weight: 800;
        padding: 5px 8px;
      }

      .pill.ok {
        background: rgb(125 223 159 / 14%);
        color: var(--ok);
      }

      .pill.warn {
        background: rgb(244 201 107 / 16%);
        color: var(--accent);
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .timeline {
        display: grid;
        gap: 10px;
      }

      .timeline-item {
        border-left: 3px solid var(--primary);
        padding-left: 12px;
      }

      .two-cols {
        display: grid;
        gap: 12px;
        grid-template-columns: 1fr 1fr;
      }

      .photo-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .photo-card {
        background:
          linear-gradient(135deg, rgb(77 245 212 / 18%), rgb(244 201 107 / 16%)),
          rgb(255 255 255 / 3%);
        border: 1px solid var(--line);
        border-radius: 8px;
        min-height: 110px;
        padding: 12px;
      }

      .alert {
        background: rgb(244 201 107 / 12%);
        border: 1px solid rgb(244 201 107 / 24%);
        border-radius: 8px;
        color: #ffe7a6;
        padding: 12px;
      }

      .empty {
        border: 1px dashed var(--line);
        border-radius: 8px;
        color: var(--muted);
        padding: 18px;
        text-align: center;
      }

      @media (max-width: 980px) {
        .login-shell,
        .shell,
        .content-grid,
        .stats,
        .two-cols {
          grid-template-columns: 1fr;
        }

        .shell {
          display: block;
          padding-top: 72px;
        }

        .mobile-topbar {
          align-items: center;
          backdrop-filter: blur(18px);
          background: rgb(6 9 13 / 82%);
          border-bottom: 1px solid var(--line);
          display: flex;
          gap: 12px;
          height: 72px;
          justify-content: space-between;
          left: 0;
          padding: 12px 16px;
          position: fixed;
          right: 0;
          top: 0;
          z-index: 40;
        }

        .mobile-brand {
          align-items: center;
          display: flex;
          gap: 10px;
          min-width: 0;
        }

        .mobile-brand strong {
          display: block;
          font-size: 1rem;
        }

        .mobile-brand span {
          color: var(--muted);
          display: block;
          font-size: 0.78rem;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .menu-toggle {
          align-items: center;
          background: linear-gradient(135deg, rgb(77 245 212 / 18%), rgb(255 255 255 / 5%));
          border: 1px solid var(--line);
          border-radius: 8px;
          color: var(--primary);
          cursor: pointer;
          display: inline-flex;
          flex-direction: column;
          gap: 5px;
          height: 44px;
          justify-content: center;
          width: 44px;
        }

        .menu-toggle span {
          background: currentColor;
          border-radius: 999px;
          display: block;
          height: 2px;
          width: 18px;
        }

        .sidebar {
          border-bottom: 0;
          border-right: 1px solid var(--line);
          bottom: 0;
          height: 100vh;
          left: 0;
          max-width: 86vw;
          overflow-y: auto;
          position: fixed;
          top: 0;
          transform: translateX(-104%);
          transition: transform 180ms ease;
          width: 300px;
          z-index: 60;
        }

        body.sidebar-open .sidebar {
          transform: translateX(0);
        }

        .sidebar-backdrop {
          background: rgb(0 0 0 / 56%);
          bottom: 0;
          display: block;
          left: 0;
          opacity: 0;
          pointer-events: none;
          position: fixed;
          right: 0;
          top: 0;
          transition: opacity 180ms ease;
          z-index: 50;
        }

        body.sidebar-open .sidebar-backdrop {
          opacity: 1;
          pointer-events: auto;
        }

        .nav {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 620px) {
        .login-hero,
        .login-panel,
        .main,
        .sidebar {
          padding: 18px;
        }

        .topbar {
          flex-direction: column;
        }

        .nav {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="app" class="app"></div>

    <script>
      const SAMPLE_USERS = [
        {
          id: "u-admin",
          name: "Ana Admin",

          password: "123456",
          role: "ADMIN"
        },
        {

        },
        {

          name: "Marina Almeida",
          email: "paciente@lipecare.test",
          password: "123456",
          role: "PATIENT",
          patientId: "p-001"
        }
      ];

      const INITIAL_STATE = {
        selectedPatientId: "p-001",
        activeView: "dashboard",
        patients: [
          {
            id: "p-001",
            fullName: "Marina Almeida",
            age: 37,

          },
          {

            age: 42,

            professional: "Dra. Raquel Peres",
            status: "Avaliação pendente",
            lastCheckin: "2026-04-18"
          },
          {
            id: "p-003",
            fullName: "Carolina Mendes",
            age: 34,
            phone: "(31) 90000-1003",
            professional: "Dra. Raquel Peres",
            status: "Em acompanhamento",
            lastCheckin: "2026-04-27"
          }
        ],
        symptoms: [
          {
            id: "s-001",
            patientId: "p-001",
            date: "2026-04-26",
            painLevel: 6,
            notes: "Dor moderada no fim do dia, piora após longos períodos sentada."
          },
          {
            id: "s-002",
            patientId: "p-001",
            date: "2026-04-21",
            painLevel: 4,
            notes: "Melhora após caminhada leve e rotina alimentar regular."
          },
          {
            id: "s-003",
            patientId: "p-002",
            date: "2026-04-18",
            painLevel: 7,
            notes: "Relato de inchaço e sensibilidade nas pernas."
          }
        ],
        measurements: [
          {
            id: "m-001",
            patientId: "p-001",
            date: "2026-04-26",
            weightKg: 72.4,
            waistCm: 83,
            hipCm: 104
          },
          {
            id: "m-002",
            patientId: "p-001",
            date: "2026-03-26",
            weightKg: 73.2,
            waistCm: 84,
            hipCm: 105
          },
          {
            id: "m-003",
            patientId: "p-003",
            date: "2026-04-27",
            weightKg: 68.1,
            waistCm: 79,
            hipCm: 99
          }
        ],
        photos: [
          {
            id: "f-001",
            patientId: "p-001",
            date: "2026-04-26",
            label: "Registro frontal"
          },
          {
            id: "f-002",
            patientId: "p-001",
            date: "2026-03-26",
            label: "Registro lateral"
          }
        ],
        auditLogs: [
          {
            id: "a-001",
            action: "patient_record_viewed",
            actor: "Dra. Raquel Peres",
            resource: "Marina Almeida",
            date: "2026-04-28 11:35"
          },
          {
            id: "a-002",
            action: "symptom_record_created",
            actor: "Marina Almeida",
            resource: "Dor nível 6",
            date: "2026-04-26 20:18"
          }
        ]
      };

      const app = document.getElementById("app");

      function readState() {
        const stored = localStorage.getItem("lipecare-mvp-state");
        if (!stored) {
          localStorage.setItem("lipecare-mvp-state", JSON.stringify(INITIAL_STATE));
          return structuredClone(INITIAL_STATE);
        }

        return JSON.parse(stored);
      }

      function writeState(nextState) {
        localStorage.setItem("lipecare-mvp-state", JSON.stringify(nextState));
      }

      function readSession() {
        const stored = localStorage.getItem("lipecare-mvp-session");
        return stored ? JSON.parse(stored) : null;
      }

      function setSession(user) {
        localStorage.setItem("lipecare-mvp-session", JSON.stringify(user));
      }

      function clearSession() {
        localStorage.removeItem("lipecare-mvp-session");
      }

      function roleLabel(role) {
        return {
          ADMIN: "Administrador",
          PROFESSIONAL: "Profissional",
          PATIENT: "Paciente"
        }[role];
      }

      function today() {
        return new Date().toISOString().slice(0, 10);
      }

      function render() {
        const session = readSession();
        if (!session) {
          renderLogin();
          return;
        }

        renderShell(session);
      }

      function renderLogin() {
        app.innerHTML = `
          <main class="login-shell">
            <section class="login-hero">
              <p class="eyebrow">LipeCare MVP</p>
              <h1>Cuidado clinico continuo, seguro e humanizado.</h1>
              <p class="muted">
                Preview funcional para validar o fluxo inicial: login, perfis,
                pacientes, sintomas, medidas, fotos evolutivas e auditoria.
              </p>
              <div class="alert">
                Dados totalmente ficticios para teste. Nao inserir dados reais de pacientes neste preview.
              </div>
            </section>
            <section class="login-panel">
              <div class="login-card card">
                <p class="eyebrow">Acesso de teste</p>
                <h2>Entrar</h2>
                <form id="login-form" class="form">
                  <label>
                    E-mail
                    <input name="email" type="email" value="profissional@lipecare.test" autocomplete="email" />
                  </label>
                  <label>
                    Senha
                    <input name="password" type="password" value="123456" autocomplete="current-password" />
                  </label>
                  <button class="btn" type="submit">Acessar MVP</button>
                </form>
                <div class="sample-users">
                  ${SAMPLE_USERS.map((user) => `
                    <button type="button" data-login="${user.email}">
                      <strong>${roleLabel(user.role)}</strong><br />
                      ${user.email} / 123456
                    </button>
                  `).join("")}
                </div>
              </div>
            </section>
          </main>
        `;

        document.getElementById("login-form").addEventListener("submit", (event) => {
          event.preventDefault();
          const data = new FormData(event.currentTarget);
          const email = String(data.get("email")).trim().toLowerCase();
          const password = String(data.get("password"));
          const user = SAMPLE_USERS.find((item) => item.email === email && item.password === password);

          if (!user) {
            alert("Usuario de teste nao encontrado.");
            return;
          }

          setSession(user);
          render();
        });

        document.querySelectorAll("[data-login]").forEach((button) => {
          button.addEventListener("click", () => {
            const user = SAMPLE_USERS.find((item) => item.email === button.dataset.login);
            setSession(user);
            render();
          });
        });
      }

      function renderShell(session) {
        const state = readState();
        const views = allowedViews(session.role);
        if (!views.includes(state.activeView)) {
          state.activeView = views[0];
          writeState(state);
        }

        app.innerHTML = `
          <main class="shell">
            <header class="mobile-topbar">
              <div class="mobile-brand">
                ${renderLogoSlot()}
                <div>
                  <strong>LipeCare</strong>
                  <span>${roleLabel(session.role)} - ${session.name}</span>
                </div>
              </div>
              <button class="menu-toggle" id="menu-toggle" type="button" aria-label="Abrir menu" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
              </button>
            </header>
            <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
            <aside class="sidebar">
              <div class="brand">
                ${renderLogoSlot()}
                <div>
                  <strong>LipeCare</strong>
                  <span class="muted">MVP funcional</span>
                </div>
              </div>
              <nav class="nav">
                ${views.map((view) => `
                  <button class="${state.activeView === view ? "active" : ""}" data-view="${view}">
                    ${viewTitle(view)}
                  </button>
                `).join("")}
              </nav>
              <div class="user-box">
                <strong>${session.name}</strong><br />
                ${roleLabel(session.role)}<br />
                ${session.email}
                <div style="margin-top: 14px;">
                  <button class="btn secondary" id="logout-btn" type="button">Sair</button>
                </div>
              </div>
            </aside>
            <section class="main">
              ${renderView(state, session)}
            </section>
          </main>
        `;

        document.querySelectorAll("[data-view]").forEach((button) => {
          button.addEventListener("click", () => {
            const nextState = readState();
            nextState.activeView = button.dataset.view;
            writeState(nextState);
            document.body.classList.remove("sidebar-open");
            render();
          });
        });

        const menuToggle = document.getElementById("menu-toggle");
        const sidebarBackdrop = document.getElementById("sidebar-backdrop");

        if (menuToggle) {
          menuToggle.addEventListener("click", () => {
            const isOpen = document.body.classList.toggle("sidebar-open");
            menuToggle.setAttribute("aria-expanded", String(isOpen));
          });
        }

        if (sidebarBackdrop) {
          sidebarBackdrop.addEventListener("click", () => {
            document.body.classList.remove("sidebar-open");
            menuToggle?.setAttribute("aria-expanded", "false");
          });
        }

        document.getElementById("logout-btn").addEventListener("click", () => {
          document.body.classList.remove("sidebar-open");
          clearSession();
          render();
        });

        bindViewEvents(session);
      }

      function allowedViews(role) {
        if (role === "PATIENT") return ["dashboard", "symptoms", "measurements", "photos"];
        return ["dashboard", "patients", "symptoms", "measurements", "photos", "audit"];
      }

      function viewTitle(view) {
        return {
          dashboard: "Dashboard",
          patients: "Pacientes",
          symptoms: "Sintomas",
          measurements: "Medidas",
          photos: "Fotos",
          audit: "Auditoria"
        }[view];
      }

      function renderView(state, session) {
        return {
          dashboard: renderDashboard,
          patients: renderPatients,
          symptoms: renderSymptoms,
          measurements: renderMeasurements,
          photos: renderPhotos,
          audit: renderAudit
        }[state.activeView](state, session);
      }

      function scopedPatients(state, session) {
        if (session.role === "PATIENT") {
          return state.patients.filter((patient) => patient.id === session.patientId);
        }

        return state.patients;
      }

      function selectedPatient(state, session) {
        const patients = scopedPatients(state, session);
        return patients.find((patient) => patient.id === state.selectedPatientId) ?? patients[0];
      }

      function renderHeader(title, subtitle, badge) {
        return `
          <header class="topbar">
            <div>
              <p class="eyebrow">LipeCare</p>
              <h1>${title}</h1>
              <p class="muted">${subtitle}</p>
            </div>
            <span class="badge">${badge}</span>
          </header>
        `;
      }

      function renderLogoSlot() {
        return `
          <div class="logo-slot" aria-label="Logo LipeCare">
            <img src="/assets/lipecare-logo.png" alt="LipeCare" />
          </div>
        `;
      }

      function renderDashboard(state, session) {
        const patients = scopedPatients(state, session);
        const symptoms = state.symptoms.filter((item) => patients.some((patient) => patient.id === item.patientId));
        const measurements = state.measurements.filter((item) => patients.some((patient) => patient.id === item.patientId));
        const photos = state.photos.filter((item) => patients.some((patient) => patient.id === item.patientId));
        const highPain = symptoms.filter((item) => Number(item.painLevel) >= 7).length;

        return `
          ${renderHeader("Dashboard", "Resumo operacional do acompanhamento clinico.", roleLabel(session.role))}
          <section class="grid stats">
            ${statCard("Pacientes", patients.length)}
            ${statCard("Registros de sintomas", symptoms.length)}
            ${statCard("Medidas", measurements.length)}
            ${statCard("Fotos privadas", photos.length)}
          </section>
          <section class="grid content-grid">
            <article class="card section">
              <h2>Fila de acompanhamento</h2>
              ${patients.length ? renderPatientTable(patients, state.selectedPatientId) : empty("Nenhum paciente encontrado.")}
            </article>
            <article class="card section">
              <h2>Alertas</h2>
              <div class="stack">
                <div class="alert">${highPain} registro(s) com dor elevada exigem revisao.</div>
                <div class="timeline">
                  ${state.auditLogs.slice(0, 4).map((log) => `
                    <div class="timeline-item">
                      <strong>${log.action}</strong>
                      <p class="muted">${log.actor} - ${log.resource} - ${log.date}</p>
                    </div>
                  `).join("")}
                </div>
              </div>
            </article>
          </section>
        `;
      }

      function statCard(label, value) {
        return `
          <article class="card stat">
            <span>${label}</span>
            <strong>${value}</strong>
          </article>
        `;
      }

      function renderPatients(state, session) {
        const patients = scopedPatients(state, session);

        return `
          ${renderHeader("Pacientes", "Cadastro inicial e selecao de paciente para acompanhamento.", "MVP")}
          <section class="grid content-grid">
            <article class="card section">
              <h2>Lista de pacientes</h2>
              ${renderPatientTable(patients, state.selectedPatientId)}
            </article>
            <article class="card section">
              <h2>Novo paciente</h2>
              <form id="patient-form" class="form">
                <label>Nome completo <input name="fullName" required /></label>
                <div class="two-cols">
                  <label>Idade <input name="age" type="number" min="0" required /></label>
                  <label>Telefone <input name="phone" /></label>
                </div>
                <button class="btn" type="submit">Cadastrar paciente</button>
              </form>
            </article>
          </section>
        `;
      }

      function renderPatientTable(patients, selectedId) {
        return `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Paciente</th>
                  <th>Idade</th>
                  <th>Status</th>
                  <th>Ultimo check-in</th>
                </tr>
              </thead>
              <tbody>
                ${patients.map((patient) => `
                  <tr class="clickable ${patient.id === selectedId ? "selected-row" : ""}" data-select-patient="${patient.id}">
                    <td><strong>${patient.fullName}</strong><br /><span class="muted">${patient.phone || "Sem telefone"}</span></td>
                    <td>${patient.age}</td>
                    <td><span class="pill ${patient.status.includes("pendente") ? "warn" : "ok"}">${patient.status}</span></td>
                    <td>${patient.lastCheckin}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `;
      }

      function renderSymptoms(state, session) {
        const patient = selectedPatient(state, session);
        const symptoms = patient ? state.symptoms.filter((item) => item.patientId === patient.id) : [];

        return `
          ${renderHeader("Sintomas", "Registro de dor e observacoes clinicas.", patient ? patient.fullName : "Sem paciente")}
          ${patient ? `
            <section class="grid content-grid">
              <article class="card section">
                <h2>Historico de sintomas</h2>
                ${symptoms.length ? `
                  <div class="timeline">
                    ${symptoms.map((item) => `
                      <div class="timeline-item">
                        <strong>${item.date} - Dor ${item.painLevel}/10</strong>
                        <p class="muted">${item.notes}</p>
                      </div>
                    `).join("")}
                  </div>
                ` : empty("Nenhum sintoma registrado.")}
              </article>
              <article class="card section">
                <h2>Novo registro</h2>
                <form id="symptom-form" class="form">
                  <label>Paciente ${renderPatientSelect(state, session)}</label>
                  <label>Data <input name="date" type="date" value="${today()}" required /></label>
                  <label>Nivel de dor <input name="painLevel" type="number" min="0" max="10" value="5" required /></label>
                  <label>Observacoes <textarea name="notes" required></textarea></label>
                  <button class="btn" type="submit">Salvar sintoma</button>
                </form>
              </article>
            </section>
          ` : empty("Nenhum paciente disponivel.")}
        `;
      }

      function renderMeasurements(state, session) {
        const patient = selectedPatient(state, session);
        const measurements = patient ? state.measurements.filter((item) => item.patientId === patient.id) : [];

        return `
          ${renderHeader("Medidas", "Acompanhamento de peso e medidas corporais.", patient ? patient.fullName : "Sem paciente")}
          ${patient ? `
            <section class="grid content-grid">
              <article class="card section">
                <h2>Historico de medidas</h2>
                ${measurements.length ? `
                  <div class="table-wrap">
                    <table>
                      <thead>
                        <tr><th>Data</th><th>Peso</th><th>Cintura</th><th>Quadril</th></tr>
                      </thead>
                      <tbody>
                        ${measurements.map((item) => `
                          <tr>
                            <td>${item.date}</td>
                            <td>${item.weightKg} kg</td>
                            <td>${item.waistCm} cm</td>
                            <td>${item.hipCm} cm</td>
                          </tr>
                        `).join("")}
                      </tbody>
                    </table>
                  </div>
                ` : empty("Nenhuma medida registrada.")}
              </article>
              <article class="card section">
                <h2>Nova medida</h2>
                <form id="measurement-form" class="form">
                  <label>Paciente ${renderPatientSelect(state, session)}</label>
                  <label>Data <input name="date" type="date" value="${today()}" required /></label>
                  <div class="two-cols">
                    <label>Peso kg <input name="weightKg" type="number" step="0.1" required /></label>
                    <label>Cintura cm <input name="waistCm" type="number" step="0.1" required /></label>
                  </div>
                  <label>Quadril cm <input name="hipCm" type="number" step="0.1" required /></label>
                  <button class="btn" type="submit">Salvar medida</button>
                </form>
              </article>
            </section>
          ` : empty("Nenhum paciente disponivel.")}
        `;
      }

      function renderPhotos(state, session) {
        const patient = selectedPatient(state, session);
        const photos = patient ? state.photos.filter((item) => item.patientId === patient.id) : [];

        return `
          ${renderHeader("Fotos evolutivas", "Preview de storage privado com registros simulados.", patient ? patient.fullName : "Sem paciente")}
          <section class="grid content-grid">
            <article class="card section">
              <h2>Galeria privada simulada</h2>
              ${photos.length ? `
                <div class="photo-grid">
                  ${photos.map((photo) => `
                    <div class="photo-card">
                      <strong>${photo.label}</strong>
                      <p class="muted">${photo.date}</p>
                      <span class="pill ok">URL assinada futura</span>
                    </div>
                  `).join("")}
                </div>
              ` : empty("Nenhuma foto registrada.")}
            </article>
            <article class="card section">
              <h2>Novo registro simulado</h2>
              <form id="photo-form" class="form">
                <label>Paciente ${renderPatientSelect(state, session)}</label>
                <label>Data <input name="date" type="date" value="${today()}" required /></label>
                <label>Descricao <input name="label" value="Registro evolutivo" required /></label>
                <div class="alert">No sistema real, arquivos vao para storage privado S3 com URL assinada.</div>
                <button class="btn" type="submit">Salvar registro</button>
              </form>
            </article>
          </section>
        `;
      }

      function renderAudit(state) {
        return `
          ${renderHeader("Auditoria", "Eventos minimos para rastreabilidade de dados sensiveis.", "LGPD")}
          <section class="card section">
            <h2>Eventos recentes</h2>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr><th>Data</th><th>Acao</th><th>Ator</th><th>Recurso</th></tr>
                </thead>
                <tbody>
                  ${state.auditLogs.map((log) => `
                    <tr>
                      <td>${log.date}</td>
                      <td>${log.action}</td>
                      <td>${log.actor}</td>
                      <td>${log.resource}</td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          </section>
        `;
      }

      function renderPatientSelect(state, session) {
        const patients = scopedPatients(state, session);
        return `
          <select name="patientId" required>
            ${patients.map((patient) => `
              <option value="${patient.id}" ${patient.id === state.selectedPatientId ? "selected" : ""}>${patient.fullName}</option>
            `).join("")}
          </select>
        `;
      }

      function empty(message) {
        return `<div class="empty">${message}</div>`;
      }

      function bindViewEvents(session) {
        document.querySelectorAll("[data-select-patient]").forEach((row) => {
          row.addEventListener("click", () => {
            const state = readState();
            state.selectedPatientId = row.dataset.selectPatient;
            state.auditLogs.unshift({
              id: crypto.randomUUID(),
              action: "patient_record_viewed",
              actor: session.name,
              resource: state.patients.find((patient) => patient.id === row.dataset.selectPatient)?.fullName ?? "Paciente",
              date: new Date().toLocaleString("pt-BR")
            });
            writeState(state);
            render();
          });
        });

        const patientForm = document.getElementById("patient-form");
        if (patientForm) {
          patientForm.addEventListener("submit", (event) => {
            event.preventDefault();
            const data = new FormData(event.currentTarget);
            const state = readState();
            const patient = {
              id: crypto.randomUUID(),
              fullName: String(data.get("fullName")),
              age: Number(data.get("age")),
              phone: String(data.get("phone")),
              professional: "Dra. Raquel Peres",
              status: "Avaliação pendente",
              lastCheckin: today()
            };
            state.patients.unshift(patient);
            state.selectedPatientId = patient.id;
            state.auditLogs.unshift({
              id: crypto.randomUUID(),
              action: "patient_created",
              actor: session.name,
              resource: patient.fullName,
              date: new Date().toLocaleString("pt-BR")
            });
            writeState(state);
            render();
          });
        }

        bindRecordForm("symptom-form", (state, data) => {
          const patient = state.patients.find((item) => item.id === String(data.get("patientId")));
          state.symptoms.unshift({
            id: crypto.randomUUID(),
            patientId: String(data.get("patientId")),
            date: String(data.get("date")),
            painLevel: Number(data.get("painLevel")),
            notes: String(data.get("notes"))
          });
          state.selectedPatientId = String(data.get("patientId"));
          return ["symptom_record_created", patient?.fullName ?? "Paciente"];
        }, session);

        bindRecordForm("measurement-form", (state, data) => {
          const patient = state.patients.find((item) => item.id === String(data.get("patientId")));
          state.measurements.unshift({
            id: crypto.randomUUID(),
            patientId: String(data.get("patientId")),
            date: String(data.get("date")),
            weightKg: Number(data.get("weightKg")),
            waistCm: Number(data.get("waistCm")),
            hipCm: Number(data.get("hipCm"))
          });
          state.selectedPatientId = String(data.get("patientId"));
          return ["measurement_record_created", patient?.fullName ?? "Paciente"];
        }, session);

        bindRecordForm("photo-form", (state, data) => {
          const patient = state.patients.find((item) => item.id === String(data.get("patientId")));
          state.photos.unshift({
            id: crypto.randomUUID(),
            patientId: String(data.get("patientId")),
            date: String(data.get("date")),
            label: String(data.get("label"))
          });
          state.selectedPatientId = String(data.get("patientId"));
          return ["photo_record_created", patient?.fullName ?? "Paciente"];
        }, session);
      }

      function bindRecordForm(formId, mutate, session) {
        const form = document.getElementById(formId);
        if (!form) return;

        form.addEventListener("submit", (event) => {
          event.preventDefault();
          const data = new FormData(event.currentTarget);
          const state = readState();
          const [action, resource] = mutate(state, data);
          state.auditLogs.unshift({
            id: crypto.randomUUID(),
            action,
            actor: session.name,
            resource,
            date: new Date().toLocaleString("pt-BR")
          });
          writeState(state);
          render();
        });
      }

      render();
    </script>
  </body>
</html>
