services:
  postgres:
    image: postgres:16-alpine
    container_name: lipecare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lipecare_local}
      POSTGRES_USER: ${POSTGRES_USER:-lipecare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lipecare_local_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lipecare} -d ${POSTGRES_DB:-lipecare_local}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lipecare-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:

